<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#14161F;
  --surface:#1C1F2B;
  --surface-2:#232739;
  --border:#2B2F40;
  --text:#EDE8DF;
  --text-muted:#8C899C;
  --gold:#D4A24C;
  --sage:#7FA66B;
  --lavender:#9C8FC4;
  --terracotta:#C97B63;
  --periwinkle:#7E8BD1;
  --danger:#C97B63;
  --radius:14px;
  --font-display:'Fraunces', serif;
  --font-body:'Work Sans', sans-serif;
  --font-mono:'Space Mono', monospace;
  --section-font-size:12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.5;padding:32px 16px 96px;}
.wrap{max-width:680px;margin:0 auto;}
/* ---- Tab bar ---- */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:200;display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 8px calc(6px + env(safe-area-inset-bottom,0px));box-shadow:0 -4px 20px #0006;}
.tabbar-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-muted);font-family:var(--font-body);font-size:12px;padding:6px 4px;border-radius:10px;cursor:pointer;transition:color .2s,background .2s;}
.tabbar-btn .tab-icon{font-size:20px;line-height:1;}
.tabbar-btn.active{color:var(--gold);background:var(--surface-2);}
.page{display:none;}
.page.active{display:block;}
/* ---- Todo page ---- */
.todo-header{margin-bottom:18px;}
.todo-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:18px;display:flex;flex-direction:column;gap:10px;}
.todo-form input[type="text"],.todo-form input[type="time"],.todo-form input[type="date"]{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-family:var(--font-body);font-size:14px;width:100%;color-scheme:dark;}
.todo-form-row{display:flex;gap:10px;}
.todo-form-row > *{flex:1;}
.btn-todo-add{background:var(--gold);color:#14161F;border:none;border-radius:10px;padding:11px 14px;font-weight:600;font-size:14px;cursor:pointer;}
.todo-section-label{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between;}
.todo-list{display:flex;flex-direction:column;gap:8px;}
.todo-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.todo-item.done{opacity:.6;}
.todo-item.dragging{opacity:.4;}
.todo-item.drag-over{box-shadow:0 -2px 0 var(--gold) inset;border-color:var(--gold);}
.todo-drag-handle{color:var(--text-muted);font-size:16px;cursor:grab;flex-shrink:0;padding:6px 6px 6px 0;touch-action:none;}
.drag-handle{color:var(--text-muted);font-size:15px;cursor:grab;flex-shrink:0;padding:4px 6px 4px 0;touch-action:none;}
.vision-idea .drag-handle{margin-top:2px;}
.todo-edit-btn{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.todo-edit-btn:hover{color:var(--gold);}
.todo-edit-form{display:flex;flex-direction:column;gap:8px;width:100%;}
.todo-edit-form input[type="text"]{background:var(--surface-2);border:1px solid var(--gold);border-radius:8px;color:var(--text);padding:8px 10px;font-family:var(--font-body);font-size:13.5px;width:100%;}
.todo-edit-form-row{display:flex;gap:8px;}
.todo-edit-form-row input[type="date"],.todo-edit-form-row input[type="time"]{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 8px;font-family:var(--font-body);font-size:12.5px;flex:1;color-scheme:dark;}
.todo-edit-form-buttons{display:flex;gap:8px;justify-content:flex-end;}
.todo-edit-form-buttons button{border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;}
.todo-edit-cancel{background:none;border:1px solid var(--border);color:var(--text-muted);}
.todo-edit-save{background:var(--gold);color:#14161F;border:none;font-weight:600;}
.todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--gold);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px;}
.todo-item.done .todo-check{background:var(--gold);color:#14161F;}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:14.5px;color:var(--text);word-break:break-word;}
.todo-item.done .todo-title{text-decoration:line-through;}
.todo-time{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);}
.todo-del{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.todo-empty{color:var(--text-muted);font-size:13px;padding:10px 0;}
.todo-clear-row{margin-top:10px;}
.btn-todo-clear{background:none;border:1px solid var(--border);color:var(--terracotta);border-radius:10px;padding:8px 12px;font-size:12.5px;cursor:pointer;}

.eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:6px;}
h1.title{font-family:var(--font-display);font-weight:700;font-size:38px;text-align:center;margin:0 0 4px;letter-spacing:-.01em;}
.subdate{text-align:center;color:var(--text-muted);font-family:var(--font-mono);font-size:13px;margin-bottom:28px;}

/* Ring */
.ring-zone{display:flex;justify-content:center;margin-bottom:28px;}
.rings-row{display:flex;justify-content:center;align-items:flex-start;gap:24px;flex-wrap:wrap;}
.ring-single{display:flex;flex-direction:column;align-items:center;}
.ring-svg-small{width:168px;height:168px;max-width:42vw;}
.bead{fill:transparent;stroke:var(--text-muted);stroke-width:2;opacity:.55;transition:fill .25s,stroke .25s,opacity .25s;}
.bead.on{fill:var(--c);stroke:var(--c);opacity:1;}
.bead-string{fill:none;stroke:var(--border);stroke-width:1;}
.ring-pct{font-family:var(--font-mono);font-weight:700;font-size:28px;text-anchor:middle;}
.ring-pct.success-color{fill:var(--gold);}
.ring-pct.fail-color{fill:var(--terracotta);}
.ring-sub{font-family:var(--font-body);font-size:10.5px;fill:var(--text-muted);text-anchor:middle;}
.ring-caption{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}

/* Sections */
.sections{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;transition:opacity .2s;}
.sections.locked{opacity:.7;}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px 8px;}
.section-card.compact{padding:10px 12px 4px;}
.section-head{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);
  font-size:var(--section-font-size);
  letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;
}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-count{margin-left:auto;font-family:var(--font-mono);font-size:var(--section-font-size);color:var(--text-muted);}

.task{display:flex;align-items:center;gap:10px;padding:9px 2px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.task:last-of-type{border-bottom:none;}
.task input{position:absolute;width:0;height:0;opacity:0;}
.box{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--text-muted);border-radius:6px;position:relative;transition:background .2s,border-color .2s;}
.box::after{content:'';position:absolute;left:5px;top:1px;width:6px;height:11px;border-right:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(40deg);opacity:0;transition:opacity .15s;}
.task input:checked + .box{background:var(--c);border-color:var(--c);}
.task input:checked + .box::after{opacity:1;}
.task .txt{font-size:14.5px;}
.section-card.compact .txt{font-size:13.5px;}
.task input:checked ~ .txt{color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--border);}
.sections.locked .task{cursor:not-allowed;}

.clear-link{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;margin:0 0 10px auto;display:block;}

/* Calendar cells */
.day-cell{
  aspect-ratio:1/1;border-radius:9px;border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:13px;color:var(--text-muted);
  position:relative;min-height:38px;gap:1px;
}
.day-num{line-height:1;}
.day-pct{font-size:11px;line-height:1;font-weight:700;color:#111;}
.day-cell.blank{border:none;}
.day-cell.has-data{color:#fff;font-weight:700;cursor:pointer;border-color:transparent;background:var(--terracotta);}
.day-cell.has-data.tier-high{background:var(--sage);border-color:var(--sage);}
.day-cell.has-data.tier-mid{background:var(--gold);border-color:var(--gold);}
.day-cell.has-data:not(.tier-high):not(.tier-mid){border-color:var(--terracotta);}
.day-cell.has-data .day-pct{color:#111;}
.day-cell.in-progress{color:var(--text);font-weight:600;border-style:dashed;border-color:var(--gold);cursor:pointer;}
.day-cell.in-progress .day-pct{color:#111;}
.day-cell.fillable{cursor:pointer;border-style:dashed;border-color:var(--border);}
.day-cell.fillable:hover{border-color:var(--text-muted);color:var(--text);}
.day-cell.future{opacity:.3;}
.day-cell.has-data.is-today{box-shadow:0 0 0 2px var(--terracotta);}
.day-cell.has-data.tier-high.is-today{box-shadow:0 0 0 2px var(--sage);}
.day-cell.has-data.tier-mid.is-today{box-shadow:0 0 0 2px var(--gold);}
.day-cell.is-today:not(.has-data){box-shadow:0 0 0 2px var(--gold);}
.day-cell.has-data:hover{filter:brightness(1.1);}

/* Comment zone */
.comment-zone{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
.comment-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.comment-input{width:100%;min-height:90px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;padding:10px 12px;resize:vertical;box-sizing:border-box;transition:border-color .2s;}
.comment-input:focus{outline:none;border-color:var(--gold);}
.comment-hint{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:5px;text-align:right;opacity:.6;}
.comment-readonly{font-family:var(--font-body);font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;}
.comment-empty{color:var(--text-muted);font-style:italic;}

/* Finish area */
.finish-zone{margin:8px 0 36px;}
.btn{width:100%;padding:14px;border-radius:var(--radius);border:none;font-family:var(--font-body);font-weight:600;font-size:15px;cursor:pointer;transition:transform .12s,opacity .12s;}
.btn:active{transform:scale(.98);}
.btn-finish{background:linear-gradient(135deg,var(--gold),#b9853a);color:#1A1306;}
.btn-finish:hover{opacity:.92;}
.done-banner{display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);border:1px solid var(--sage);border-radius:var(--radius);padding:14px 16px;font-family:var(--font-mono);font-size:13.5px;flex-wrap:wrap;gap:6px;}
.done-banner b{color:var(--sage);font-size:16px;}
.fail-inline{color:var(--terracotta);font-weight:600;}
.link-btn{background:none;border:none;color:var(--gold);font-family:var(--font-mono);font-size:12px;text-decoration:underline;cursor:pointer;}
.link-btn.danger{color:var(--danger);}

/* Month table */
.month-section{border-top:1px solid var(--border);padding-top:24px;}
h2.month-title{font-family:var(--font-display);font-size:22px;margin:0 0 14px;text-align:center;}
.month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:4px;}
.nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{border-color:var(--gold);}
.month-label{font-family:var(--font-mono);font-size:14px;min-width:150px;text-align:center;}
.month-avg{text-align:center;color:var(--text-muted);font-family:var(--font-mono);font-size:12px;margin-bottom:16px;}
.month-avg b{color:var(--gold);}
.grid-wrap{overflow-x:auto;}
.weekday-row,.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.weekday-row{margin-bottom:6px;}
.weekday-row span{text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.week-row{margin-bottom:6px;}
.legend{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 22px;font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);flex-wrap:wrap;}
.legend-swatch{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:-2px;}

/* Editor panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;}
.detail-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:8px;}
.detail-head h3{font-family:var(--font-display);font-size:17px;margin:0;flex:1;}
.close-x{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;}
.editor-sections{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.editor-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.editor-pct{font-family:var(--font-mono);color:var(--gold);font-size:16px;font-weight:700;}
.editor-buttons{display:flex;align-items:center;gap:14px;}
.editor-buttons .btn{width:auto;padding:11px 18px;}
.btn-danger{background:var(--danger);color:#1A1306;border:none;border-radius:10px;padding:9px 14px;font-family:var(--font-body);font-weight:600;font-size:13px;cursor:pointer;}

/* Footer */
.footer{border-top:1px solid var(--border);padding-top:20px;display:flex;flex-direction:column;gap:10px;}
.footer-row{display:flex;gap:10px;}
.btn-ghost{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12.5px;}
.btn-ghost:hover{border-color:var(--gold);}
.status-msg{font-family:var(--font-mono);font-size:12px;color:var(--sage);min-height:16px;text-align:center;}
.status-msg.error{color:var(--terracotta);}
.note{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-align:center;line-height:1.6;}
.reset-block{margin-top:18px;border-top:1px dashed var(--border);padding-top:16px;}
.reset-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:8px;}
.reset-row{display:flex;gap:8px;flex-wrap:wrap;}
.reset-row .btn-ghost{font-size:11.5px;padding:9px 6px;}
.reset-row .btn-ghost:hover{border-color:var(--danger);}
.confirm-bar{background:var(--surface-2);border:1px solid var(--danger);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px;font-family:var(--font-mono);font-size:12px;}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end;}
.confirm-actions .btn-ghost{flex:none;padding:7px 14px;}

/* Task management */
.manage-block{margin-top:18px;border-top:1px dashed var(--border);padding-top:16px;}
.manage-toggle-row{display:flex;justify-content:center;margin-bottom:4px;}
.manage-toggle-row .btn-ghost{flex:none;padding:9px 16px;}
.manage-group{margin:14px 0;}
.manage-group-title{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.manage-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.manage-row.dragging{opacity:.4;}
.manage-row.drag-over{box-shadow:0 -2px 0 var(--gold) inset;}
.manage-row:last-child{border-bottom:none;}
.move-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.move-btns button{background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);width:22px;height:18px;font-size:9px;border-radius:4px;cursor:pointer;line-height:1;padding:0;}
.move-btns button:disabled{opacity:.25;cursor:default;}
.row-label{flex:1;font-size:13.5px;}
.row-tag{color:var(--text-muted);font-size:10.5px;}
.row-actions{display:flex;gap:10px;flex-shrink:0;}
.row-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;}
.row-actions button:hover{color:var(--gold);}
.row-actions button.danger:hover{color:var(--danger);}
.row-empty{font-size:12px;color:var(--text-muted);font-style:italic;padding:4px 0;}
.edit-form{display:flex;flex-direction:column;gap:8px;flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.edit-form input[type=text],.edit-form select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-family:var(--font-body);font-size:13.5px;width:100%;}
.chk-row{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.edit-buttons{display:flex;gap:10px;justify-content:flex-end;}
.add-task-form{margin-top:10px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.add-task-form select,.add-task-form input[type=text]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-family:var(--font-body);font-size:13.5px;width:100%;}
.manage-subhead{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:4px 0 8px;}
.color-row{display:flex;align-items:center;gap:8px;}
input[type=color]{width:38px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:2px;cursor:pointer;}

/* Weight input in manage */
.weight-input{width:52px;background:var(--surface-2);border:1px solid var(--border);color:var(--gold);border-radius:6px;padding:3px 6px;font-family:var(--font-mono);font-size:12px;text-align:center;}
.weight-input:focus{outline:none;border-color:var(--gold);}
.weight-wrap{display:inline-flex;align-items:center;gap:4px;}
.weight-pct{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}

/* Streak */
.streak-row{display:flex;justify-content:center;gap:14px;margin-bottom:22px;}
.streak-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 18px;text-align:center;min-width:96px;}
.streak-chip.alt{border-color:var(--periwinkle);}
.streak-num{display:block;font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--gold);}
.streak-chip.alt .streak-num{color:var(--periwinkle);}
.streak-label{font-family:var(--font-mono);font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}

/* Month chart */
.month-chart-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:8px;}
.month-chart-wrap{overflow-x:auto;margin-bottom:18px;background:#fff;border-radius:var(--radius);padding:10px 6px;}
.chart-grid{stroke:#dfe3ea;stroke-width:1;}
.chart-grid-v{stroke:#dfe3ea;stroke-width:1;}
.chart-axis{stroke:#dfe3ea;stroke-width:1;}
.chart-line{fill:none;stroke:var(--gold);stroke-width:2;stroke-linejoin:round;stroke-linecap:round;}
.chart-area{fill:var(--gold);opacity:.12;}
.chart-point{stroke:#fff;stroke-width:1;}
.chart-point.today{stroke:#fff;stroke-width:1.5;}
.chart-dot{fill:#c7ccd6;opacity:.7;}
.chart-daylabel{font-family:var(--font-body);font-size:8.5px;fill:#5b6270;text-anchor:middle;}
.chart-ylabel{font-family:var(--font-body);font-size:8.5px;fill:#5b6270;text-anchor:end;}

/* Task stats */
.stats-block{margin-top:16px;border-top:1px dashed var(--border);padding-top:16px;}
.stats-toggle-row{display:flex;justify-content:center;margin-bottom:4px;}
.stats-toggle-row .btn-ghost{flex:none;padding:9px 16px;}
.stats-note{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-align:center;margin:10px 0;}
.stats-empty{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center;padding:14px 0;}
.stats-list{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.stat-label{flex:1;font-size:12.5px;min-width:0;}
.stat-pct{font-family:var(--font-mono);font-size:12px;font-weight:700;flex-shrink:0;}
.stat-bar-track{width:100%;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;}
.stat-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:3px;}

.loading{text-align:center;color:var(--text-muted);font-family:var(--font-mono);padding:60px 0;}

/* Group section actions in manage */
.grp-actions{display:flex;gap:6px;margin-left:auto;}
.grp-actions button{border:1px solid var(--border);color:var(--text-muted);background:none;border-radius:7px;padding:3px 9px;cursor:pointer;font-size:12px;font-family:var(--font-body);}
.grp-actions button:hover{color:var(--gold);border-color:var(--gold);}
.grp-actions button.del:hover{color:var(--danger);border-color:var(--danger);}
.confirm-del-row{display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);}
.confirm-del-row button{border:1px solid var(--border);color:var(--text-muted);background:none;border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer;}
.confirm-del-row button.confirm{border-color:var(--danger);color:var(--danger);}

/* Mood/Energy/Motivation widget */
.mood-zone{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px 12px;margin-bottom:14px;}
.mood-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.mood-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mood-row:last-of-type{margin-bottom:0;}
.mood-name{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;width:82px;flex-shrink:0;}
.mood-scale{display:flex;gap:6px;flex:1;}
.mood-btn{flex:1;height:30px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);transition:border-color .15s,background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:3px;}
.mood-btn:hover{border-color:var(--gold);color:var(--text);}
.mood-btn.active-1{background:#C97B63;border-color:#C97B63;color:#1A1306;font-weight:700;}
.mood-btn.active-2{background:#D4A24C;border-color:#D4A24C;color:#1A1306;font-weight:700;}
.mood-btn.active-3{background:#7FA66B;border-color:#7FA66B;color:#1A1306;font-weight:700;}
.mood-btn.active-4{background:#4CAF85;border-color:#4CAF85;color:#1A1306;font-weight:700;}
.mood-btn.active-5{background:#7E8BD1;border-color:#7E8BD1;color:#1A1306;font-weight:700;}
.mood-readonly{display:flex;gap:14px;flex-wrap:wrap;}
.mood-readonly-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mood-readonly-val{font-family:var(--font-mono);font-size:18px;font-weight:700;}
.mood-readonly-name{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}

/* Correlation chart */
.corr-chart-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin:16px 0 8px;}
.corr-chart-wrap{background:#fff;border-radius:var(--radius);padding:10px 6px;overflow-x:auto;margin-bottom:8px;}
.corr-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:10px;}
.corr-swatch{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;vertical-align:-1px;}
.corr-empty{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center;padding:12px 0;font-style:italic;}

@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}
@media(max-width:420px){h1.title{font-size:30px;}.ring-svg-small{width:130px;height:130px;}.ring-pct{font-size:22px;}}

/* Notifications */
.notif-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.notif-bar .notif-txt{flex:1;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:140px;}
.notif-bar .notif-txt b{color:var(--gold);display:block;margin-bottom:2px;}
.btn-notif{background:linear-gradient(135deg,var(--gold),#b9853a);color:#1A1306;border:none;border-radius:10px;padding:9px 16px;font-family:var(--font-body);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;}
.btn-notif.on{background:linear-gradient(135deg,var(--sage),#5a8c47);color:#0f1a0d;}
.btn-notif.denied{background:var(--surface-2);color:var(--text-muted);cursor:default;border:1px solid var(--border);}
.notif-install{background:var(--surface-2);border:1px solid var(--periwinkle);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);line-height:1.7;}
.notif-install b{color:var(--periwinkle);}
.notif-install ol{margin:6px 0 0 16px;padding:0;}
.notif-install li{margin-bottom:2px;}

/* Sélecteur de langue — dropdown */
.lang-select-wrap{position:relative;display:flex;justify-content:flex-end;margin-bottom:8px;}
.lang-current{display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:6px 12px;cursor:pointer;font-family:var(--font-mono);font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.05em;user-select:none;}
.lang-current .lang-arrow{font-size:10px;color:var(--text-muted);transition:transform .2s;}
.lang-current.open .lang-arrow{transform:rotate(180deg);}
.lang-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:99;min-width:130px;box-shadow:0 8px 24px #0006;}
.lang-dropdown.visible{display:block;}

/* ---- GLOBAL: générique glisser-déposer pour réordonner des listes ----
   Utilise les Pointer Events (souris ET tactile) plutôt que l'API HTML5
   Drag & Drop, qui ne fonctionne pas sur la plupart des navigateurs mobiles.
   Le glisser démarre uniquement depuis une poignée ".drag-handle" ou
   ".todo-drag-handle" pour ne pas gêner le défilement normal de la liste. */
function setupDragReorder(container, selector, getId, onDrop){
  if(!container || container._dragReorderBound) return;
  container._dragReorderBound = true;
  const HANDLE_SEL = '.drag-handle, .todo-drag-handle';
  let draggedEl = null, draggedId = null, dragging = false, startX = 0, startY = 0;
  const THRESHOLD = 6;

  function items(){ return Array.from(container.querySelectorAll(selector)); }
  function clearOver(){ items().forEach(el => el.classList.remove('drag-over')); }

  function onMove(e){
    if(!draggedEl) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if(!dragging){
      if(Math.sqrt(dx*dx + dy*dy) < THRESHOLD) return;
      dragging = true;
      draggedEl.classList.add('dragging');
    }
    e.preventDefault();
    const under = document.elementFromPoint(e.clientX, e.clientY);
    const overItem = under ? under.closest(selector) : null;
    clearOver();
    if(overItem && overItem !== draggedEl && container.contains(overItem)){
      overItem.classList.add('drag-over');
    }
  }

  function onUp(e){
    if(draggedEl){
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const overItem = under ? under.closest(selector) : null;
      draggedEl.classList.remove('dragging');
      clearOver();
      if(dragging && overItem && overItem !== draggedEl && container.contains(overItem)){
        const targetId = getId(overItem);
        if(targetId && targetId !== draggedId) onDrop(draggedId, targetId);
      }
    }
    draggedEl = null; draggedId = null; dragging = false;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onUp);
  }

  container.addEventListener('pointerdown', e => {
    const handle = e.target.closest(HANDLE_SEL);
    if(!handle) return;
    const item = handle.closest(selector);
    if(!item) return;
    draggedEl = item;
    draggedId = getId(item);
    dragging = false;
    startX = e.clientX; startY = e.clientY;
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  });
}

const LANG_KEY = 'mizan-lang';
let LANG = TRANSLATIONS[localStorage.getItem(LANG_KEY) || 'fr'];

function setLang(code){
  localStorage.setItem(LANG_KEY, code);
  LANG = TRANSLATIONS[code];
  document.documentElement.setAttribute('dir', LANG.dir);
  document.documentElement.setAttribute('lang', code);
  render();
}

const LANG_OPTIONS = [
  {code:'fr', flag:'🇫🇷', name:'Français'},
  {code:'ar', flag:'🇸🇦', name:'العربية'},
  {code:'en', flag:'🇬🇧', name:'English'},
  {code:'de', flag:'🇩🇪', name:'Deutsch'},
];

function langSelectorHTML(){
  const cur = localStorage.getItem(LANG_KEY) || 'fr';
  const active = LANG_OPTIONS.find(l=>l.code===cur) || LANG_OPTIONS[0];
  return `<div class="lang-select-wrap">
    <div class="lang-current" id="langCurrentSuivie">
      <span>${active.flag}</span>
      <span>${active.code.toUpperCase()}</span>
      <span class="lang-arrow">▼</span>
    </div>
    <div class="lang-dropdown" id="langDropdownSuivie">
      ${LANG_OPTIONS.map(l=>`
        <div class="lang-option ${l.code===cur?'active':''}" data-lang="${l.code}">
          <span class="lang-flag">${l.flag}</span>
          <span class="lang-name">${l.name}</span>
          ${l.code===cur?'<span>✓</span>':''}
        </div>`).join('')}
    </div>
  </div>`;
}
function getLangDefaults(){
  return {
    groups: LANG.defaultGroups,
    tasks: LANG.defaultTasks,
    groupOrder: LANG.defaultGroupOrder,
  };
}
const TASKS_VERSION = 5;

/* ---- STORAGE (localStorage) ---- */
const STORAGE_KEY = 'mizan-tracker-data';
const LS_OK = (()=>{ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; }})();

async function loadData(){
  if(!LS_OK) return {days:{}};
  try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{days:{}}; }catch(e){ return {days:{}}; }
}
async function saveData(d){
  if(!LS_OK){ showStatus(LANG.statusNoStorage, true); return; }
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }catch(e){ showStatus(LANG.statusSaveErr, true); }
}

/* ---- HELPERS ---- */
function pad(n){ return n<10?'0'+n:String(n); }
function keyOf(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function longDate(d){ const s=`${LANG.weekdaysLong[d.getDay()]} ${d.getDate()} ${LANG.months[d.getMonth()]} ${d.getFullYear()}`; return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getTasks(){ return DATA.tasks; }
function getCountedTasks(){ return DATA.tasks.filter(t=>t.count!==false); }
function getTotal(){ return getCountedTasks().length; }

function getWeights(){
  const counted = getCountedTasks();
  const n = counted.length;
  if(!n) return {};
  const saved = DATA.weights || {};
  // somme des poids fixés manuellement
  let fixed = 0, fixedCount = 0;
  counted.forEach(t=>{ if(saved[t.id]!=null){ fixed+=saved[t.id]; fixedCount++; } });
  const free = n - fixedCount;
  const remainder = Math.max(0, 100 - fixed);
  const eachFree = free > 0 ? remainder/free : 0;
  const w = {};
  counted.forEach(t=>{
    w[t.id] = saved[t.id]!=null ? saved[t.id] : eachFree;
  });
  return w;
}

function setTaskWeight(id, val){
  if(!DATA.weights) DATA.weights = {};
  DATA.weights[id] = val;
  saveData(DATA);
}

function pctOf(taskState){
  const weights = getWeights();
  let total = 0;
  Object.entries(weights).forEach(([id, w])=>{ if(taskState[id]) total += w; });
  return Math.min(100, Math.round(total));
}

function countChecked(taskState){ return getCountedTasks().reduce((n,t)=>n+(taskState[t.id]?1:0),0); }

function ensureGroups(){
  const def = getLangDefaults();
  if(!DATA.groups||typeof DATA.groups!=='object'||Object.keys(DATA.groups).length===0){
    DATA.groups = JSON.parse(JSON.stringify(def.groups));
  }
  if(!DATA.groupOrder||!Array.isArray(DATA.groupOrder)||DATA.groupOrder.length===0){
    DATA.groupOrder = def.groupOrder.slice();
  }
}

function ensureTasks(){
  const def = getLangDefaults();
  if(!DATA.tasks||!Array.isArray(DATA.tasks)||DATA.tasks.length===0||DATA.tasksVersion!==TASKS_VERSION){
    DATA.tasks = JSON.parse(JSON.stringify(def.tasks));
    DATA.tasksVersion = TASKS_VERSION;
    DATA.groups = JSON.parse(JSON.stringify(def.groups));
    DATA.groupOrder = def.groupOrder.slice();
    delete DATA.weights;
  }
}

function emptyTaskState(){ const t={}; DATA.tasks.forEach(tk=>t[tk.id]=false); return t; }

function ensureToday(){
  if(!DATA.days[todayKey]){
    DATA.days[todayKey]={tasks:emptyTaskState(),finished:false,percent:0,comment:'',mood:{}};
  }
  if(DATA.days[todayKey].comment===undefined) DATA.days[todayKey].comment='';
  if(DATA.days[todayKey].mood===undefined) DATA.days[todayKey].mood={};
}

  const checkedN = items.reduce((n,t)=>n+(entry.tasks[t.id]?1:0),0);
  return `

        <span class="dot" style="background:${g.color}"></span>

function finishHTML(entry){

function ringsHTML(entry){
  return `<div class="rings-row">${singleRingSVG(entry,false)}${singleRingSVG(entry,true)}</div>`;
}

function singleRingSVG(entry, invert){
  const cx=84,cy=84,R=64,beadR=5.5;
  const counted=getCountedTasks(); const total=getTotal(); let beads='';
  counted.forEach((t,i)=>{
    const angle=(i/total)*2*Math.PI-Math.PI/2;
    const x=cx+R*Math.cos(angle); const y=cy+R*Math.sin(angle);
    const checked=!!entry.tasks[t.id]; const on=invert?!checked:checked;
    const color=invert?'#C97B63':DATA.groups[t.group]?DATA.groups[t.group].color:'#888';
    beads+=`<circle class="bead ${on?'on':''}" style="--c:${color}" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${beadR}" data-ring="${invert?'fail':'success'}" data-id="${t.id}"></circle>`;
  });
  const pct=pctOf(entry.tasks); const n=countChecked(entry.tasks);
  const showPct=invert?(100-pct):pct; const showN=invert?(total-n):n;
  const kind=invert?'fail':'success';
  return `
    <div class="ring-single">
      <svg class="ring-svg-small" viewBox="0 0 168 168">
        <circle class="bead-string" cx="${cx}" cy="${cy}" r="${R}"></circle>
        ${beads}
        <text class="ring-pct ${invert?'fail-color':'success-color'}" id="ringPercent_${kind}" x="${cx}" y="${cy-2}">${showPct}%</text>
        <text class="ring-sub" id="ringCount_${kind}" x="${cx}" y="${cy+16}">${showN} / ${total}</text>
      </svg>
      <div class="ring-caption">${invert?LANG.ringFail:LANG.ringSuccess}</div>
    </div>`;
}

function correlationChartHTML(){
  const days = Object.entries(DATA.days)
    .filter(([,d])=>d.finished && d.mood && Object.keys(d.mood).length>0)
    .sort(([a],[b])=>a.localeCompare(b));
  if(days.length<2){
    return `<div class="corr-empty">${LANG.corrEmpty}</div>`;
  }
  const W=340,H=130,pad={l:28,r:10,t:14,b:22};
  const plotW=W-pad.l-pad.r; const plotH=H-pad.t-pad.b;

  // grid lines
  let grid='';
  [0,25,50,75,100].forEach(p=>{
    const y=pad.t+plotH-(p/100)*plotH;
    grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="#dfe3ea" stroke-width="1"/>`;
    grid+=`<text x="${pad.l-4}" y="${(y+3).toFixed(1)}" font-family="Work Sans,sans-serif" font-size="7" fill="#5b6270" text-anchor="end">${p}%</text>`;
  });

  const n=days.length;
  const xOf=(i)=>pad.l+(i/(n-1))*plotW;

  // performance line
  let perfPts=days.map(([,d],i)=>`${xOf(i).toFixed(1)},${(pad.t+plotH-(d.percent/100)*plotH).toFixed(1)}`).join(' ');
  let perfDots=days.map(([,d],i)=>{
    const x=xOf(i); const y=pad.t+plotH-(d.percent/100)*plotH;
    const c=d.percent>=71?'#7FA66B':d.percent>=50?'#D4A24C':'#C97B63';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${c}" stroke="#fff" stroke-width="1"><title>${d.percent}%</title></circle>`;
  }).join('');

  // mood lines
  const moodLineColors={energy:'#7E8BD1',motivation:'#9C8FC4',humeur:'#D4A24C'};
  let moodLines='';
  getMoodDims().forEach(dim=>{
    const pts=days.filter(([,d])=>d.mood[dim.id]!=null)
      .map(([,d],i)=>{
        const idx=days.findIndex(([,dd])=>dd===d);
        const x=xOf(idx); const y=pad.t+plotH-((d.mood[dim.id]-1)/4)*plotH;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
    if(pts.length>1) moodLines+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${moodLineColors[dim.id]}" stroke-width="1.5" stroke-dasharray="4,2" opacity=".8"/>`;
  });

  // x labels (first and last + every 5)
  let xLabels='';
  days.forEach(([key],i)=>{
    if(i===0||i===n-1||i%5===0){
      const d=parseKey(key);
      xLabels+=`<text x="${xOf(i).toFixed(1)}" y="${(H-4)}" font-family="Work Sans,sans-serif" font-size="7" fill="#5b6270" text-anchor="middle">${d.getDate()}</text>`;
    }
  });

  const dimLabels = getMoodDims();
  return `
  <div class="corr-chart-title">${LANG.corrTitle}</div>
  <div class="corr-legend">
    <span><span class="corr-swatch" style="background:var(--gold)"></span>% </span>
    <span><span class="corr-swatch" style="background:#7E8BD1"></span>${dimLabels[0].label}</span>
    <span><span class="corr-swatch" style="background:#9C8FC4"></span>${dimLabels[1].label}</span>
    <span><span class="corr-swatch" style="background:#D4A24C;opacity:.7"></span>${dimLabels[2].label}</span>
  </div>
  <div class="corr-chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      ${grid}
      <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+plotH}" stroke="#dfe3ea" stroke-width="1"/>
      ${moodLines}
      <polyline points="${perfPts}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round"/>
      ${perfDots}
      ${xLabels}
    </svg>
  </div>`;
}

function onTaskToggle(e){
  const id=e.target.getAttribute('data-id'); if(!id) return;
  const entry=DATA.days[todayKey];
  entry.tasks[id]=e.target.checked;
  document.querySelectorAll(`.bead[data-id="${id}"]`).forEach(b=>{
    const ring=b.getAttribute('data-ring'); const isOn=ring==='fail'?!e.target.checked:e.target.checked;
    b.classList.toggle('on',isOn);
  });
  const pct=pctOf(entry.tasks); const n=countChecked(entry.tasks); const total=getTotal();
  document.getElementById('ringPercent_success').textContent=pct+'%';
  document.getElementById('ringCount_success').textContent=n+' / '+total;
  document.getElementById('ringPercent_fail').textContent=(100-pct)+'%';
  document.getElementById('ringCount_fail').textContent=(total-n)+' / '+total;
  const task=DATA.tasks.find(t=>t.id===id);
  if(task){
    const items=DATA.tasks.filter(t=>t.group===task.group);
    const cn=items.reduce((n,t)=>n+(entry.tasks[t.id]?1:0),0);
    const card=e.target.closest('.section-card');
    if(card) card.querySelector('.sec-count').textContent=cn+'/'+items.length;

  saveData(DATA);
}

/* ---- MONTH GRID ---- */
function buildCells(year,month){
  const first=new Date(year,month,1); const offset=(first.getDay()+6)%7;
  const dim=new Date(year,month+1,0).getDate(); const cells=[];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(new Date(year,month,d));
  while(cells.length%7!==0) cells.push(null);
  return cells;
}

function tierClass(pct){ if(pct>=71) return ' tier-high'; if(pct>=50) return ' tier-mid'; return ''; }
function tierColorVar(pct){ if(pct>=71) return 'var(--sage)'; if(pct>=50) return 'var(--gold)'; return 'var(--terracotta)'; }

function computeStreaks(){
  const finishedKeys = Object.keys(DATA.days).filter(k=>DATA.days[k].finished).sort();
  if(finishedKeys.length===0) return {current:0, best:0};
  const finishedSet = new Set(finishedKeys);
  let best=1, run=1;
  for(let i=1;i<finishedKeys.length;i++){
    const prev=parseKey(finishedKeys[i-1]);
    const cur=parseKey(finishedKeys[i]);
    const diff=Math.round((cur-prev)/86400000);
    run = diff===1 ? run+1 : 1;
    if(run>best) best=run;
  }
  let cursor=new Date(todayMid);
  if(!finishedSet.has(todayKey)) cursor.setDate(cursor.getDate()-1);
  let current=0;
  while(finishedSet.has(keyOf(cursor))){ current++; cursor.setDate(cursor.getDate()-1); }
  return {current, best};
}

function monthChartSVG(year, month){
  const dim = new Date(year, month+1, 0).getDate();
  const barW=10, gap=5, plotH=70, baseY=82, leftPad=26;
  const slot = barW+gap;
  const plotW = dim*slot+gap;
  const totalW = leftPad+plotW;

  let gridLines='', yLabels='';
  [0,25,50,75,100].forEach(p=>{
    const y = baseY-(p/100)*plotH;
    if(p>0) gridLines += `<line x1="${leftPad}" y1="${y.toFixed(1)}" x2="${totalW}" y2="${y.toFixed(1)}" class="chart-grid"></line>`;
    yLabels += `<text class="chart-ylabel" x="${leftPad-6}" y="${(y+2.8).toFixed(1)}">${p}%</text>`;
  });

  const points=[];
  for(let d=1; d<=dim; d++){
    const date=new Date(year,month,d);
    const key=keyOf(date);
    const entry=DATA.days[key];
    const isFuture = date.getTime()>todayMid.getTime();
    const cx = leftPad+gap+(d-1)*slot+barW/2;
    let value=null;
    if(!isFuture && entry){ value = entry.finished?entry.percent:pctOf(entry.tasks); }
    points.push({d,x:cx, y: value!=null?(baseY-(value/100)*plotH):null, value, isFuture, isToday:key===todayKey});
  }

  let segments=[], cur=[];
  points.forEach(p=>{
    if(!p.isFuture && p.value!=null) cur.push(p);
    else { if(cur.length) segments.push(cur); cur=[]; }
  });
  if(cur.length) segments.push(cur);

  let linesAndFills='';
  segments.forEach(seg=>{
    if(seg.length<2) return;
    const linePts = seg.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const fillPts = `${seg[0].x.toFixed(1)},${baseY} ${linePts} ${seg[seg.length-1].x.toFixed(1)},${baseY}`;
    linesAndFills += `<polygon points="${fillPts}" class="chart-area"></polygon>`;
    linesAndFills += `<polyline points="${linePts}" class="chart-line"></polyline>`;
  });

  let dots='';
  points.forEach(p=>{
    if(p.isFuture) return;
    if(p.value==null){
      dots += `<circle class="chart-dot" cx="${p.x.toFixed(1)}" cy="${baseY-2}" r="1.6"></circle>`;
    } else {
      const color = tierColorVar(p.value);
      const r = p.isToday?4:2.6;
      dots += `<circle class="chart-point${p.isToday?' today':''}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${color}"><title>${p.d} — ${p.value}%</title></circle>`;
    }
  });

  let labels='', vGridLines='';
  points.forEach(p=>{
    vGridLines += `<line x1="${p.x.toFixed(1)}" y1="${(baseY-plotH).toFixed(1)}" x2="${p.x.toFixed(1)}" y2="${baseY}" class="chart-grid-v"></line>`;
    if(p.d===1||p.d===dim||p.d%5===0){
      labels += `<text class="chart-daylabel" x="${p.x.toFixed(1)}" y="${baseY+13}">${p.d}</text>`;
    }
  });

  return `
    <div class="month-chart-title">Progression du mois</div>
    <svg class="month-chart-svg" viewBox="0 0 ${totalW} 100" width="${totalW}" height="100">
      ${vGridLines}
      ${gridLines}
      <line x1="${leftPad}" y1="${baseY}" x2="${totalW}" y2="${baseY}" class="chart-axis"></line>
      ${linesAndFills}
      ${dots}
      ${labels}
      ${yLabels}
    </svg>`;
}

function computeTaskStats(){
  const finishedDays = Object.values(DATA.days).filter(d=>d.finished);
  const totalDays = finishedDays.length;
  const weights = getWeights();
  return DATA.tasks.map(t=>{
    const doneCount = finishedDays.reduce((n,d)=> n + (d.tasks && d.tasks[t.id] ? 1 : 0), 0);
    const rate = totalDays ? Math.round(doneCount/totalDays*100) : 0;
    return {t, rate, doneCount, totalDays, weight: weights[t.id]!=null?Math.round(weights[t.id]):null};
  }).sort((a,b)=>a.rate-b.rate);
}

function statsPanelHTML(){
  const stats = computeTaskStats();
  const totalDays = stats.length ? stats[0].totalDays : 0;
  if(totalDays===0){
    return `<div class="stats-empty">${LANG.statsEmpty}</div>`;
  }
  return `
    ${correlationChartHTML()}
    <div class="stats-note">${LANG.statsNote(totalDays)}</div>
    <div class="stats-list">
      ${stats.map(s=>{
        const color = tierColorVar(s.rate);
        const g = DATA.groups[s.t.group];
        const metaParts = [`${s.doneCount}/${s.totalDays} jours`];
        if(s.weight!=null) metaParts.push(`poids ${s.weight}%`);
        else if(s.t.count===false) metaParts.push('hors score');
        return `
          <div class="stat-item">
            <div class="stat-row">
              <span class="dot" style="background:${g?g.color:'#888'}"></span>
              <span class="stat-label">${esc(s.t.label)}</span>
              <span class="stat-pct" style="color:${color}">${s.rate}%</span>
            </div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${s.rate}%;background:${color}"></div></div>
            <div class="stat-meta">${metaParts.join(' · ')}</div>
          </div>`;
      }).join('')}
    </div>`;
}

function dayStatus(date){
  const key=keyOf(date); const entry=DATA.days[key];
  const isToday=key===todayKey; const isFuture=date.getTime()>todayMid.getTime();
  return { key,entry,isToday,isFuture, exists:!!entry, finished:entry?entry.finished:false, pct:entry?(entry.finished?entry.percent:pctOf(entry.tasks)):0 };
}

function renderMonth(){
  document.getElementById('monthLabel').textContent=`${LANG.months[viewMonth].charAt(0).toUpperCase()+LANG.months[viewMonth].slice(1)} ${viewYear}`;
  document.getElementById('monthChart').innerHTML=monthChartSVG(viewYear,viewMonth);
  const cells=buildCells(viewYear,viewMonth); const rows=[];
  for(let i=0;i<cells.length;i+=7) rows.push(cells.slice(i,i+7));
  let pctSum=0,pctN=0,html='';
  rows.forEach(week=>{
    html+=`<div class="week-row">`;
    week.forEach(date=>{
      if(!date){ html+=`<div class="day-cell blank"></div>`; return; }
      const st=dayStatus(date); let cls='day-cell',style='',pctLabel='';
      if(st.isFuture){ cls+=' future'; }
      else if(st.exists&&st.finished){
        cls+=' has-data'+tierClass(st.pct); pctLabel=st.pct+'%'; pctSum+=st.pct; pctN++;
        if(st.isToday) cls+=' is-today';
      } else if(st.isToday){
        cls+=' is-today'; if(st.exists) pctLabel=st.pct+'%';
      } else if(st.exists&&!st.finished){
        cls+=' in-progress'; pctLabel=st.pct+'%';
      } else { cls+=' fillable'; }
      const pctHtml=pctLabel?`<span class="day-pct">${pctLabel}</span>`:'';
      html+=`<div class="${cls}" ${style} data-key="${st.key}"><span class="day-num">${date.getDate()}</span>${pctHtml}</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('monthGrid').innerHTML=html;
  document.getElementById('monthAvg').innerHTML=pctN>0?LANG.monthAvg(Math.round(pctSum/pctN),pctN):LANG.monthNone;
  document.querySelectorAll('.day-cell.has-data,.day-cell.in-progress,.day-cell.fillable').forEach(el=>{
    el.addEventListener('click',()=>openEditor(el.getAttribute('data-key')));
  });
}

        <div class="comment-label">${LANG.editorComment}</div>

        </div>`).join('')}

        <span class="editor-pct" id="editorPct">${pct}% <span class="fail-inline">(${100-pct}% non fait)</span></span>
        <div class="editor-buttons">
          ${existing?`<button class="link-btn danger" id="deleteDay">${LANG.editorDelete}</button>`:''}
          <button class="btn btn-finish" id="saveDay">${LANG.editorSave}</button>
        </div>
      </div>
    </div>`;
  const zone=document.getElementById('editorZone'); zone.innerHTML=html;
  document.getElementById('closeEditor').addEventListener('click',closeEditor);

  zone.querySelector('.editor-sections').addEventListener('change',onEditorToggle);

  const delBtn=document.getElementById('deleteDay'); if(delBtn) delBtn.addEventListener('click',()=>confirmDeleteDay(key));
  zone.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function editorSectionHTML(groupId,tasksState){
  const g=DATA.groups[groupId]; if(!g) return '';
  const items=DATA.tasks.filter(t=>t.group===groupId); if(!items.length) return '';
  return `
    <div class="section-card compact">
      <div class="section-head"><span class="dot" style="background:${g.color}"></span>${esc(g.label)}</div>

function onEditorToggle(e){
  const id=e.target.getAttribute('data-id'); if(!id||!currentEditor) return;
  currentEditor.tasks[id]=e.target.checked; const pct=pctOf(currentEditor.tasks);
  document.getElementById('editorPct').innerHTML=`${pct}% <span class="fail-inline">(${100-pct}% non fait)</span>`;
}

function saveEditorDay(){
  if(!currentEditor) return;
  const pct=pctOf(currentEditor.tasks);
  DATA.days[currentEditor.key]={tasks:currentEditor.tasks,finished:true,percent:pct,finishedAt:new Date().toISOString(),comment:currentEditor.comment||'',mood:currentEditor.mood||{}};
  saveData(DATA); closeEditor(); renderMonth(); showStatus(LANG.statusDaySaved);
}

function confirmDeleteDay(key){
  const zone=document.getElementById('editorActions');

function formatNotifDateShort(dateStr){
  if(!dateStr) return '';
  const parts = dateStr.split('-');
  if(parts.length !== 3) return dateStr;
  return `${parts[2]}/${parts[1]}`;
}
function reorderManageTask(draggedId, targetId){
  const draggedTask = DATA.tasks.find(t=>t.id===draggedId);
  const targetTask = DATA.tasks.find(t=>t.id===targetId);
  if(!draggedTask || !targetTask || draggedTask.group !== targetTask.group) return;
  const fromIdx = DATA.tasks.indexOf(draggedTask);
  DATA.tasks.splice(fromIdx, 1);
  const toIdx = DATA.tasks.indexOf(targetTask);
  DATA.tasks.splice(toIdx, 0, draggedTask);
  saveData(DATA); render();
}

function onManageClick(e){
  const btn=e.target.closest('button[data-action]'); if(!btn) return;
  const action=btn.getAttribute('data-action'); const id=btn.getAttribute('data-id');
  if(action==='move-up') moveTask(id,-1);
  else if(action==='move-down') moveTask(id,1);
  else if(action==='edit-task'){ editingTaskId=id; confirmDelTaskId=null; render(); }
  else if(action==='cancel-edit-task'){ editingTaskId=null; render(); }
  else if(action==='save-edit-task') saveEditTask(id);
  else if(action==='clear-notif-time'){
    const nt=document.getElementById('editNotifTime'); if(nt) nt.value='';
    const nd=document.getElementById('editNotifDate'); if(nd) nd.value='';
    btn.style.display='none';
  }
  else if(action==='del-task'){ confirmDelTaskId=id; editingTaskId=null; render(); }
  else if(action==='cancel-del-task'){ confirmDelTaskId=null; render(); }
  else if(action==='confirm-del-task') deleteTask(id);
  else if(action==='add-task') addNewTask();
  else if(action==='edit-group'){ editingGroupId=id; confirmDelGroupId=null; render(); }
  else if(action==='cancel-edit-group'){ editingGroupId=null; render(); }
  else if(action==='save-edit-group') saveEditGroup(id);
  else if(action==='del-group'){ confirmDelGroupId=id; editingGroupId=null; render(); }
  else if(action==='cancel-del-group'){ confirmDelGroupId=null; render(); }
  else if(action==='confirm-del-group'){
    const ids=DATA.tasks.filter(t=>t.group===id).map(t=>t.id);
    DATA.tasks=DATA.tasks.filter(t=>t.group!==id);
    DATA.groupOrder=DATA.groupOrder.filter(x=>x!==id);
    delete DATA.groups[id];
    Object.values(DATA.days).forEach(day=>{ ids.forEach(tid=>{ if(day.tasks) delete day.tasks[tid]; }); });
    confirmDelGroupId=null; saveData(DATA); render(); showStatus(LANG.statusGroupDel);
  }
  else if(action==='add-group') addNewGroup();
  else if(action==='section-font-up'||action==='section-font-down'){
    const cur=DATA.sectionFontSize||12;
    const next=action==='section-font-up'?Math.min(cur+2,28):Math.max(cur-2,10);
    DATA.sectionFontSize=next; applySectionFontSize(next); saveData(DATA);
    const lbl=document.getElementById('fontSizeLabel'); if(lbl) lbl.textContent=next+'px';
  }
}

function saveEditGroup(id){
  const g=DATA.groups[id]; if(!g) return;
  const li=document.getElementById('editGroupLabelInput'); const ci=document.getElementById('editGroupColorInput');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptyLabel, true); return; }
  g.label=label; if(ci) g.color=ci.value;
  editingGroupId=null; saveData(DATA); render(); showStatus(LANG.statusGroupEdited);
}

function addNewGroup(){
  const li=document.getElementById('newGroupLabel'); const ci=document.getElementById('newGroupColor');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptySection, true); return; }
  const id='grp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  DATA.groups[id]={label, color:ci?ci.value:'#9C8FC4'};
  DATA.groupOrder.push(id); saveData(DATA); render(); showStatus(LANG.statusGroupAdded);
}

function moveTask(id,dir){
  const task=DATA.tasks.find(t=>t.id===id); if(!task) return;
  const gi=DATA.tasks.filter(t=>t.group===task.group); const pos=gi.findIndex(t=>t.id===id);
  const sw=gi[pos+dir]; if(!sw) return;
  const i1=DATA.tasks.indexOf(task); const i2=DATA.tasks.indexOf(sw);
  [DATA.tasks[i1],DATA.tasks[i2]]=[DATA.tasks[i2],DATA.tasks[i1]];
  saveData(DATA); render();
}

function saveEditTask(id){
  const task=DATA.tasks.find(t=>t.id===id); if(!task) return;
  const li=document.getElementById('editLabelInput'); const gs=document.getElementById('editGroupSelect'); const cc=document.getElementById('editCountChk');
  const nt=document.getElementById('editNotifTime');
  const nd=document.getElementById('editNotifDate');
  const label=li?li.value.trim():''; if(!label){ showStatus('Le nom est vide.', true); return; }
  task.label=label; task.group=gs.value; if(cc.checked) delete task.count; else task.count=false;
  if(nt && nt.value) task.notifTime=nt.value; else delete task.notifTime;
  if(nd && nd.value) task.notifDate=nd.value; else delete task.notifDate;
  editingTaskId=null; saveData(DATA);
  // Reprogrammer les notifications avec les nouvelles heures
  if(notifEnabled() && Notification.permission==='granted') scheduleAllNotifications();
  render(); showStatus(LANG.statusTaskEdited);
}

function deleteTask(id){
  DATA.tasks.splice(DATA.tasks.findIndex(t=>t.id===id),1);
  Object.values(DATA.days).forEach(day=>{ if(day.tasks) delete day.tasks[id]; });
  if(DATA.weights) delete DATA.weights[id];
  confirmDelTaskId=null; saveData(DATA); render(); showStatus(LANG.statusTaskDel);
}

function addNewTask(){
  const li=document.getElementById('newTaskLabel'); const gs=document.getElementById('newTaskGroup'); const cc=document.getElementById('newTaskCount');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptyTask, true); return; }
  const id='task_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const t={id,group:gs.value,label}; if(!cc.checked) t.count=false;
  DATA.tasks.push(t); saveData(DATA); render(); showStatus(LANG.statusTaskAdded);
}

/* ---- EXPORT / IMPORT ---- */
function onExport(){
  try{
    const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`suivie-${todayKey}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showStatus(LANG.statusExport);
  }catch(e){ showStatus(LANG.statusExportErr, true); }
}
function onImport(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const inc=JSON.parse(ev.target.result); if(!inc||!inc.days) throw new Error('format');
      DATA.days=Object.assign({},DATA.days,inc.days);
      if(inc.tasks&&Array.isArray(inc.tasks)&&inc.tasks.length) DATA.tasks=inc.tasks;
      if(inc.groups&&typeof inc.groups==='object') DATA.groups=inc.groups;
      if(inc.groupOrder&&Array.isArray(inc.groupOrder)) DATA.groupOrder=inc.groupOrder;
      if(inc.weights) DATA.weights=inc.weights;
      ensureGroups(); ensureTasks(); ensureToday(); saveData(DATA); render(); showStatus(LANG.statusImport);
    }catch(err){ showStatus(LANG.statusImportErr, true); }
  };
  reader.readAsText(file); e.target.value='';
}

function showStatus(msg,isError){
  const el=document.getElementById('statusMsg'); if(!el) return;
  el.textContent=msg; el.classList.toggle('error',!!isError);
  clearTimeout(statusTimer); statusTimer=setTimeout(()=>{ el.textContent=''; },4500);
}

/* ---- NOTIFICATIONS ---- */
const NOTIF_KEY = 'mizan-notif-enabled';
let _notifTimers = [];

function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function notifEnabled(){
  return localStorage.getItem(NOTIF_KEY) === '1';
}

function buildScheduleFromTasks(){
  // Construit la liste de notifications depuis les tâches qui ont un notifTime (+ notifDate optionnel)
  return DATA.tasks
    .filter(t => t.notifTime)
    .map(t => {
      const [h, m] = t.notifTime.split(':').map(Number);
      const group = DATA.groups[t.group];
      const emoji = group ? '🔔' : '🔔';
      return {
        h, m,
        date: t.notifDate || null,
        id: t.id,
        title: `${emoji} ${t.label}`,
        body: LANG.notifBody(t.label)
      };
    });
}

function clearAllNotifTimers(){
  _notifTimers.forEach(id => clearTimeout(id));
  _notifTimers = [];
}

function scheduleAllNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  if(!notifEnabled()) return;
  if(!('serviceWorker' in navigator)) return;

  clearAllNotifTimers();
  const schedule = buildScheduleFromTasks();
  if(schedule.length === 0) return;

  navigator.serviceWorker.ready.then(reg => {
    const now = new Date();
    schedule.forEach(item => {
      let target;
      if(item.date){
        const [y, mo, d] = item.date.split('-').map(Number);
        target = new Date(y, mo - 1, d, item.h, item.m, 0, 0);
        if(target <= now) return; // date+heure ponctuelles déjà passées
      } else {
        target = new Date();
        target.setHours(item.h, item.m, 0, 0);
        if(target <= now) target.setDate(target.getDate() + 1);
      }
      const delay = target.getTime() - now.getTime();
      if(delay > 2147483000) return;
      const tid = setTimeout(() => {
        if(Notification.permission === 'granted' && notifEnabled()){
          const dayKey = item.date || todayKey;
          const entry = DATA && DATA.days[dayKey];
          if(entry && entry.tasks && entry.tasks[item.id] === true) return;
          reg.showNotification(item.title, {
            body: LANG.notifBody(item.title.replace(/^[^ ]+ /,'')),
            icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'32\' fill=\'%2314161F\'/%3E%3Ccircle cx=\'96\' cy=\'96\' r=\'60\' fill=\'none\' stroke=\'%23D4A24C\' stroke-width=\'8\'/%3E%3Ctext x=\'96\' y=\'108\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
            badge: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 96 96\'%3E%3Crect width=\'96\' height=\'96\' rx=\'16\' fill=\'%2314161F\'/%3E%3Ctext x=\'48\' y=\'64\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
            tag: 'suivie-' + item.id,
            renotify: true,
            vibrate: [200, 100, 200],
            data: { taskId: item.id }
          });
          // Re-programmer pour le lendemain après déclenchement (sauf notif ponctuelle datée)
          if(!item.date) setTimeout(() => scheduleAllNotifications(), 5000);
        }
      }, delay);
      _notifTimers.push(tid);
    });
  }).catch(() => {});
}

async function requestNotifPermission(){
  if(!('Notification' in window)){
    showStatus('Notifications non supportées sur ce navigateur.', true);
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    localStorage.setItem(NOTIF_KEY, '1');
    scheduleAllNotifications();
    showStatus('Notifications activées ✅');
    renderNotifBar();
    new Notification('✅ Suivie — Notifications activées', {
      body: LANG.notifTestBody,
      icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'32\' fill=\'%2314161F\'/%3E%3Ccircle cx=\'96\' cy=\'96\' r=\'60\' fill=\'none\' stroke=\'%23D4A24C\' stroke-width=\'8\'/%3E%3Ctext x=\'96\' y=\'108\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
    });
  } else {
    showStatus('Permission refusée. Active les notifications dans les réglages.', true);
    renderNotifBar();
  }
}

function disableNotifications(){
  localStorage.setItem(NOTIF_KEY, '0');
  clearAllNotifTimers();
  showStatus('Notifications désactivées.');
  renderNotifBar();
}

function notifBarHTML(){
  const hasNotifAPI = 'Notification' in window;
  const perm = hasNotifAPI ? Notification.permission : 'denied';
  const enabled = notifEnabled();
  const standalone = isStandalone();
  const ios = isIOS();
  const scheduled = buildScheduleFromTasks();

  if(ios && !standalone){
    return `
      <div class="notif-install" id="notifInstallGuide">
        <b>${LANG.notifInstallTitle}</b>
        ${LANG.notifInstallSteps.map(s=>`<li>${s}</li>`).join('')}
      </div>`;
  }

  if(!hasNotifAPI || perm === 'denied'){
    return `
      <div class="notif-bar">
        <div class="notif-txt"><b>${LANG.notifTitleOff}</b>${LANG.notifUnavailable}</div>
        <button class="btn-notif denied" disabled>${LANG.notifDenied}</button>
      </div>`;
  }

  if(perm === 'granted' && enabled){
    const count = scheduled.length;
    const countTxt = LANG.notifEnabled(count);
    return `
      <div class="notif-bar">
        <div class="notif-txt"><b>${LANG.notifTitle}</b>${countTxt}</div>
        <button class="btn-notif on" id="btnNotif">${LANG.notifActive}</button>
      </div>`;
  }

  return `
    <div class="notif-bar">
      <div class="notif-txt"><b>${LANG.notifTitleOff}</b>${LANG.notifDesc}</div>
      <button class="btn-notif" id="btnNotif">${LANG.notifActivate}</button>
    </div>`;
}

function renderNotifBar(){
  const zone = document.getElementById('notifBarZone');
  if(!zone) return;
  zone.innerHTML = notifBarHTML();
  const btn = document.getElementById('btnNotif');
  if(btn){
    if(notifEnabled() && Notification.permission === 'granted'){
      btn.addEventListener('click', disableNotifications);
    } else {
      btn.addEventListener('click', requestNotifPermission);
    }
  }
}

/* ---- HELPERS ---- */
function pad(n){ return n<10?'0'+n:String(n); }
function keyOf(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function longDate(d){ const s=`${LANG.weekdaysLong[d.getDay()]} ${d.getDate()} ${LANG.months[d.getMonth()]} ${d.getFullYear()}`; return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getTasks(){ return DATA.tasks; }
function getCountedTasks(){ return DATA.tasks.filter(t=>t.count!==false); }
function getTotal(){ return getCountedTasks().length; }

function getWeights(){
  const counted = getCountedTasks();
  const n = counted.length;
  if(!n) return {};
  const saved = DATA.weights || {};
  // somme des poids fixés manuellement
  let fixed = 0, fixedCount = 0;
  counted.forEach(t=>{ if(saved[t.id]!=null){ fixed+=saved[t.id]; fixedCount++; } });
  const free = n - fixedCount;
  const remainder = Math.max(0, 100 - fixed);
  const eachFree = free > 0 ? remainder/free : 0;
  const w = {};
  counted.forEach(t=>{
    w[t.id] = saved[t.id]!=null ? saved[t.id] : eachFree;
  });
  return w;
}

function setTaskWeight(id, val){
  if(!DATA.weights) DATA.weights = {};
  DATA.weights[id] = val;
  saveData(DATA);
}

function pctOf(taskState){
  const weights = getWeights();
  let total = 0;
  Object.entries(weights).forEach(([id, w])=>{ if(taskState[id]) total += w; });
  return Math.min(100, Math.round(total));
}

function countChecked(taskState){ return getCountedTasks().reduce((n,t)=>n+(taskState[t.id]?1:0),0); }

function ensureGroups(){

  if(!DATA.groupOrder||!Array.isArray(DATA.groupOrder)||DATA.groupOrder.length===0){

  }
}

function ensureTasks(){
  const def = getLangDefaults();
  if(!DATA.tasks||!Array.isArray(DATA.tasks)||DATA.tasks.length===0||DATA.tasksVersion!==TASKS_VERSION){
    DATA.tasks = JSON.parse(JSON.stringify(def.tasks));
    DATA.tasksVersion = TASKS_VERSION;
    DATA.groups = JSON.parse(JSON.stringify(def.groups));
    DATA.groupOrder = def.groupOrder.slice();

  }
}

function ringsHTML(entry){
  return `<div class="rings-row">${singleRingSVG(entry,false)}${singleRingSVG(entry,true)}</div>`;
}

function singleRingSVG(entry, invert){
  const cx=84,cy=84,R=64,beadR=5.5;
  const counted=getCountedTasks(); const total=getTotal(); let beads='';
  counted.forEach((t,i)=>{
    const angle=(i/total)*2*Math.PI-Math.PI/2;
    const x=cx+R*Math.cos(angle); const y=cy+R*Math.sin(angle);
    const checked=!!entry.tasks[t.id]; const on=invert?!checked:checked;
    const color=invert?'#C97B63':DATA.groups[t.group]?DATA.groups[t.group].color:'#888';
    beads+=`<circle class="bead ${on?'on':''}" style="--c:${color}" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${beadR}" data-ring="${invert?'fail':'success'}" data-id="${t.id}"></circle>`;
  });
  const pct=pctOf(entry.tasks); const n=countChecked(entry.tasks);
  const showPct=invert?(100-pct):pct; const showN=invert?(total-n):n;
  const kind=invert?'fail':'success';
  return `
    <div class="ring-single">
      <svg class="ring-svg-small" viewBox="0 0 168 168">
        <circle class="bead-string" cx="${cx}" cy="${cy}" r="${R}"></circle>
        ${beads}
        <text class="ring-pct ${invert?'fail-color':'success-color'}" id="ringPercent_${kind}Tr" x="${cx}" y="${cy-2}">${showPct}%</text>
        <text class="ring-sub" id="ringCount_${kind}Tr" x="${cx}" y="${cy+16}">${showN} / ${total}</text>
      </svg>
      <div class="ring-caption">${invert?LANG.ringFail:LANG.ringSuccess}</div>
    </div>`;
}

function correlationChartHTML(){
  const days = Object.entries(DATA.days)
    .filter(([,d])=>d.finished && d.mood && Object.keys(d.mood).length>0)
    .sort(([a],[b])=>a.localeCompare(b));
  if(days.length<2){
    return `<div class="corr-empty">${LANG.corrEmpty}</div>`;
  }
  const W=340,H=130,pad={l:28,r:10,t:14,b:22};
  const plotW=W-pad.l-pad.r; const plotH=H-pad.t-pad.b;

  // grid lines
  let grid='';
  [0,25,50,75,100].forEach(p=>{
    const y=pad.t+plotH-(p/100)*plotH;
    grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="#dfe3ea" stroke-width="1"/>`;
    grid+=`<text x="${pad.l-4}" y="${(y+3).toFixed(1)}" font-family="Work Sans,sans-serif" font-size="7" fill="#5b6270" text-anchor="end">${p}%</text>`;
  });

  const n=days.length;
  const xOf=(i)=>pad.l+(i/(n-1))*plotW;

  // performance line
  let perfPts=days.map(([,d],i)=>`${xOf(i).toFixed(1)},${(pad.t+plotH-(d.percent/100)*plotH).toFixed(1)}`).join(' ');
  let perfDots=days.map(([,d],i)=>{
    const x=xOf(i); const y=pad.t+plotH-(d.percent/100)*plotH;
    const c=d.percent>=71?'#7FA66B':d.percent>=50?'#D4A24C':'#C97B63';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${c}" stroke="#fff" stroke-width="1"><title>${d.percent}%</title></circle>`;
  }).join('');

  // mood lines
  const moodLineColors={energy:'#7E8BD1',motivation:'#9C8FC4',humeur:'#D4A24C'};
  let moodLines='';
  getMoodDims().forEach(dim=>{
    const pts=days.filter(([,d])=>d.mood[dim.id]!=null)
      .map(([,d],i)=>{
        const idx=days.findIndex(([,dd])=>dd===d);
        const x=xOf(idx); const y=pad.t+plotH-((d.mood[dim.id]-1)/4)*plotH;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
    if(pts.length>1) moodLines+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${moodLineColors[dim.id]}" stroke-width="1.5" stroke-dasharray="4,2" opacity=".8"/>`;
  });

  // x labels (first and last + every 5)
  let xLabels='';
  days.forEach(([key],i)=>{
    if(i===0||i===n-1||i%5===0){
      const d=parseKey(key);
      xLabels+=`<text x="${xOf(i).toFixed(1)}" y="${(H-4)}" font-family="Work Sans,sans-serif" font-size="7" fill="#5b6270" text-anchor="middle">${d.getDate()}</text>`;
    }
  });

  const dimLabels = getMoodDims();
  return `
  <div class="corr-chart-title">${LANG.corrTitle}</div>
  <div class="corr-legend">
    <span><span class="corr-swatch" style="background:var(--gold)"></span>% </span>
    <span><span class="corr-swatch" style="background:#7E8BD1"></span>${dimLabels[0].label}</span>
    <span><span class="corr-swatch" style="background:#9C8FC4"></span>${dimLabels[1].label}</span>
    <span><span class="corr-swatch" style="background:#D4A24C;opacity:.7"></span>${dimLabels[2].label}</span>
  </div>
  <div class="corr-chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      ${grid}
      <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+plotH}" stroke="#dfe3ea" stroke-width="1"/>
      ${moodLines}
      <polyline points="${perfPts}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round"/>
      ${perfDots}
      ${xLabels}
    </svg>
  </div>`;
}

  const toggleStatsBtn=document.getElementById('toggleStatsTr');

    setupDragReorder(manageZone, '.manage-row', el => el.getAttribute('data-id'), reorderManageTask);
  }
  /* commentaire auto-save */
  const ci=document.getElementById('commentInputTr');
  if(ci){ let t=null; ci.addEventListener('input',()=>{ clearTimeout(t); t=setTimeout(()=>{ DATA.days[todayKey].comment=ci.value; saveData(DATA); },600); }); }
  /* mood buttons */
  const mz=document.getElementById('moodZoneTr');
  if(mz){ mz.addEventListener('click',e=>{ const btn=e.target.closest('.mood-btn'); if(!btn) return; const dim=btn.getAttribute('data-mood-dim'); const val=parseInt(btn.getAttribute('data-mood-val')); if(!dim||isNaN(val)) return; if(!DATA.days[todayKey].mood) DATA.days[todayKey].mood={}; DATA.days[todayKey].mood[dim]=val; saveData(DATA); mz.querySelectorAll(`.mood-btn[data-mood-dim="${dim}"]`).forEach((b,i)=>{ b.className='mood-btn'+(val===i+1?' active-'+(i+1):''); }); }); }
  /* sélecteur de langue — dropdown */
  const langCurrent = document.getElementById('langCurrentTrading');
  const langDropdown = document.getElementById('langDropdownTrading');
  if(langCurrent && langDropdown){
    langCurrent.addEventListener('click', e => {
      e.stopPropagation();
      langCurrent.classList.toggle('open');
      langDropdown.classList.toggle('visible');
    });
    langDropdown.querySelectorAll('.lang-option').forEach(opt => {
      opt.addEventListener('click', () => {
        setLang(opt.getAttribute('data-lang'));
      });
    });
    document.addEventListener('click', e => {
      if(!langCurrent.contains(e.target) && !langDropdown.contains(e.target)){
        langCurrent.classList.remove('open');
        langDropdown.classList.remove('visible');
      }
    });
  }
}

function onTaskToggle(e){
  const id=e.target.getAttribute('data-id'); if(!id) return;
  const entry=DATA.days[todayKey];
  entry.tasks[id]=e.target.checked;
  document.querySelectorAll(`.bead[data-id="${id}"]`).forEach(b=>{
    const ring=b.getAttribute('data-ring'); const isOn=ring==='fail'?!e.target.checked:e.target.checked;
    b.classList.toggle('on',isOn);
  });
