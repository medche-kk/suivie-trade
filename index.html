/* ---- MONTH GRID ---- */
function buildCells(year,month){
  const first=new Date(year,month,1); const offset=(first.getDay()+6)%7;
  const dim=new Date(year,month+1,0).getDate(); const cells=[];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(new Date(year,month,d));
  while(cells.length%7!==0) cells.push(null);
  return cells;
}

function tierClass(pct){ if(pct>=71) return ' tier-high'; if(pct>=50) return ' tier-mid'; return ''; }
function tierColorVar(pct){ if(pct>=71) return 'var(--sage)'; if(pct>=50) return 'var(--gold)'; return 'var(--terracotta)'; }

function computeStreaks(){
  const finishedKeys = Object.keys(DATA.days).filter(k=>DATA.days[k].finished).sort();
  if(finishedKeys.length===0) return {current:0, best:0};
  const finishedSet = new Set(finishedKeys);
  let best=1, run=1;
  for(let i=1;i<finishedKeys.length;i++){
    const prev=parseKey(finishedKeys[i-1]);
    const cur=parseKey(finishedKeys[i]);
    const diff=Math.round((cur-prev)/86400000);
    run = diff===1 ? run+1 : 1;
    if(run>best) best=run;
  }
  let cursor=new Date(todayMid);
  if(!finishedSet.has(todayKey)) cursor.setDate(cursor.getDate()-1);
  let current=0;
  while(finishedSet.has(keyOf(cursor))){ current++; cursor.setDate(cursor.getDate()-1); }
  return {current, best};
}

function streakRowHTML(){
  const s = computeStreaks();
  const fire = s.current>0 ? '🔥 ' : '';
  return `
    <div class="streak-row">
      <div class="streak-chip">
        <span class="streak-num">${fire}${s.current}</span>
        <span class="streak-label">${LANG.streakDays(s.current)}</span>
      </div>
      <div class="streak-chip alt">
        <span class="streak-num">${s.best}</span>
        <span class="streak-label">${LANG.streakRecord}</span>
      </div>
    </div>`;
}

function monthChartSVG(year, month){
  const dim = new Date(year, month+1, 0).getDate();
  const barW=10, gap=5, plotH=70, baseY=82, leftPad=26;
  const slot = barW+gap;
  const plotW = dim*slot+gap;
  const totalW = leftPad+plotW;

  let gridLines='', yLabels='';
  [0,25,50,75,100].forEach(p=>{
    const y = baseY-(p/100)*plotH;
    if(p>0) gridLines += `<line x1="${leftPad}" y1="${y.toFixed(1)}" x2="${totalW}" y2="${y.toFixed(1)}" class="chart-grid"></line>`;
    yLabels += `<text class="chart-ylabel" x="${leftPad-6}" y="${(y+2.8).toFixed(1)}">${p}%</text>`;
  });

  const points=[];
  for(let d=1; d<=dim; d++){
    const date=new Date(year,month,d);
    const key=keyOf(date);
    const entry=DATA.days[key];
    const isFuture = date.getTime()>todayMid.getTime();
    const cx = leftPad+gap+(d-1)*slot+barW/2;
    let value=null;
    if(!isFuture && entry){ value = entry.finished?entry.percent:pctOf(entry.tasks); }
    points.push({d,x:cx, y: value!=null?(baseY-(value/100)*plotH):null, value, isFuture, isToday:key===todayKey});
  }

  let segments=[], cur=[];
  points.forEach(p=>{
    if(!p.isFuture && p.value!=null) cur.push(p);
    else { if(cur.length) segments.push(cur); cur=[]; }
  });
  if(cur.length) segments.push(cur);

  let linesAndFills='';
  segments.forEach(seg=>{
    if(seg.length<2) return;
    const linePts = seg.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const fillPts = `${seg[0].x.toFixed(1)},${baseY} ${linePts} ${seg[seg.length-1].x.toFixed(1)},${baseY}`;
    linesAndFills += `<polygon points="${fillPts}" class="chart-area"></polygon>`;
    linesAndFills += `<polyline points="${linePts}" class="chart-line"></polyline>`;
  });

  let dots='';
  points.forEach(p=>{
    if(p.isFuture) return;
    if(p.value==null){
      dots += `<circle class="chart-dot" cx="${p.x.toFixed(1)}" cy="${baseY-2}" r="1.6"></circle>`;
    } else {
      const color = tierColorVar(p.value);
      const r = p.isToday?4:2.6;
      dots += `<circle class="chart-point${p.isToday?' today':''}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${color}"><title>${p.d} — ${p.value}%</title></circle>`;
    }
  });

  let labels='', vGridLines='';
  points.forEach(p=>{
    vGridLines += `<line x1="${p.x.toFixed(1)}" y1="${(baseY-plotH).toFixed(1)}" x2="${p.x.toFixed(1)}" y2="${baseY}" class="chart-grid-v"></line>`;
    if(p.d===1||p.d===dim||p.d%5===0){
      labels += `<text class="chart-daylabel" x="${p.x.toFixed(1)}" y="${baseY+13}">${p.d}</text>`;
    }
  });

  return `
    <div class="month-chart-title">Progression du mois</div>
    <svg class="month-chart-svg" viewBox="0 0 ${totalW} 100" width="${totalW}" height="100">
      ${vGridLines}
      ${gridLines}
      <line x1="${leftPad}" y1="${baseY}" x2="${totalW}" y2="${baseY}" class="chart-axis"></line>
      ${linesAndFills}
      ${dots}
      ${labels}
      ${yLabels}
    </svg>`;
}

function computeTaskStats(){
  const finishedDays = Object.values(DATA.days).filter(d=>d.finished);
  const totalDays = finishedDays.length;
  const weights = getWeights();
  return DATA.tasks.map(t=>{
    const doneCount = finishedDays.reduce((n,d)=> n + (d.tasks && d.tasks[t.id] ? 1 : 0), 0);
    const rate = totalDays ? Math.round(doneCount/totalDays*100) : 0;
    return {t, rate, doneCount, totalDays, weight: weights[t.id]!=null?Math.round(weights[t.id]):null};
  }).sort((a,b)=>a.rate-b.rate);
}

function statsPanelHTML(){
  const stats = computeTaskStats();
  const totalDays = stats.length ? stats[0].totalDays : 0;
  if(totalDays===0){
    return `<div class="stats-empty">${LANG.statsEmpty}</div>`;
  }
  return `
    ${correlationChartHTML()}
    <div class="stats-note">${LANG.statsNote(totalDays)}</div>
    <div class="stats-list">
      ${stats.map(s=>{
        const color = tierColorVar(s.rate);
        const g = DATA.groups[s.t.group];
        const metaParts = [`${s.doneCount}/${s.totalDays} jours`];
        if(s.weight!=null) metaParts.push(`poids ${s.weight}%`);
        else if(s.t.count===false) metaParts.push('hors score');
        return `
          <div class="stat-item">
            <div class="stat-row">
              <span class="dot" style="background:${g?g.color:'#888'}"></span>
              <span class="stat-label">${esc(s.t.label)}</span>
              <span class="stat-pct" style="color:${color}">${s.rate}%</span>
            </div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${s.rate}%;background:${color}"></div></div>
            <div class="stat-meta">${metaParts.join(' · ')}</div>
          </div>`;
      }).join('')}
    </div>`;
}

function dayStatus(date){
  const key=keyOf(date); const entry=DATA.days[key];
  const isToday=key===todayKey; const isFuture=date.getTime()>todayMid.getTime();
  return { key,entry,isToday,isFuture, exists:!!entry, finished:entry?entry.finished:false, pct:entry?(entry.finished?entry.percent:pctOf(entry.tasks)):0 };
}

function renderMonth(){
  document.getElementById('monthLabel').textContent=`${LANG.months[viewMonth].charAt(0).toUpperCase()+LANG.months[viewMonth].slice(1)} ${viewYear}`;
  document.getElementById('monthChart').innerHTML=monthChartSVG(viewYear,viewMonth);
  const cells=buildCells(viewYear,viewMonth); const rows=[];
  for(let i=0;i<cells.length;i+=7) rows.push(cells.slice(i,i+7));
  let pctSum=0,pctN=0,html='';
  rows.forEach(week=>{
    html+=`<div class="week-row">`;
    week.forEach(date=>{
      if(!date){ html+=`<div class="day-cell blank"></div>`; return; }
      const st=dayStatus(date); let cls='day-cell',style='',pctLabel='';
      if(st.isFuture){ cls+=' future'; }
      else if(st.exists&&st.finished){
        cls+=' has-data'+tierClass(st.pct); pctLabel=st.pct+'%'; pctSum+=st.pct; pctN++;
        if(st.isToday) cls+=' is-today';
      } else if(st.isToday){
        cls+=' is-today'; if(st.exists) pctLabel=st.pct+'%';
      } else if(st.exists&&!st.finished){
        cls+=' in-progress'; pctLabel=st.pct+'%';
      } else { cls+=' fillable'; }
      const pctHtml=pctLabel?`<span class="day-pct">${pctLabel}</span>`:'';
      html+=`<div class="${cls}" ${style} data-key="${st.key}"><span class="day-num">${date.getDate()}</span>${pctHtml}</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('monthGrid').innerHTML=html;
  document.getElementById('monthAvg').innerHTML=pctN>0?LANG.monthAvg(Math.round(pctSum/pctN),pctN):LANG.monthNone;
  document.querySelectorAll('.day-cell.has-data,.day-cell.in-progress,.day-cell.fillable').forEach(el=>{
    el.addEventListener('click',()=>openEditor(el.getAttribute('data-key')));
  });
}

function saveEditorDay(){

      </div>
    </div>
    <div class="manage-subhead">${LANG.sections}</div>`;

  DATA.groupOrder.forEach(id=>{
    const g=DATA.groups[id]; if(!g) return;

    if(editingGroupId===id){
      html+=`
        <div class="manage-group">
          <div class="manage-group-title" style="flex-wrap:wrap;gap:8px;">

            <input type="text" id="editGroupLabelInput" value="${esc(g.label)}" style="flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--gold);color:var(--text);border-radius:8px;padding:4px 8px;font-size:13px;font-family:var(--font-body);">
            <div class="color-row"><span class="chk-row">${LANG.colorLabel}</span><input type="color" id="editGroupColorInput" value="${g.color}"></div>
            <div class="edit-buttons" style="width:100%;justify-content:flex-end;">
              <button class="link-btn" data-action="cancel-edit-group">${LANG.cancel}</button>
              <button class="btn btn-finish" style="width:auto;padding:9px 16px;" data-action="save-edit-group" data-id="${id}">${LANG.save}</button>
            </div>
          </div>
        </div>`;
    } else if(confirmDelGroupId===id){
      html+=`
        <div class="manage-group">
          <div class="confirm-del-row">
            <span>${LANG.delGroup(esc(g.label), items.length)}</span>
            <button class="confirm" data-action="confirm-del-group" data-id="${id}">${LANG.deleteBtn}</button>
            <button data-action="cancel-del-group">${LANG.cancel}</button>

    } else {
      html+=`
        <div class="manage-group">
          <div class="manage-group-title">
            <span class="dot" style="background:${g.color}"></span>

              <button data-action="edit-group" data-id="${id}">${LANG.rename}</button>
              <button class="del" data-action="del-group" data-id="${id}">${LANG.deleteBtn}</button>
            </div>
          </div>
        </div>`;
    }
  });

  html+=`
    <!-- Ajouter section -->
    <div class="add-task-form" style="border-color:var(--lavender);">
      <div class="manage-subhead" style="margin:0 0 4px;">${LANG.newSection}</div>
      <input type="text" id="newGroupLabel" placeholder="${LANG.sectionPlaceholder}">
      <div class="color-row"><span class="chk-row">Couleur</span><input type="color" id="newGroupColor" value="#9C8FC4"></div>
      <button class="btn btn-ghost" data-action="add-group" style="flex:none;border-color:var(--lavender);color:var(--lavender);">${LANG.createSection}</button>
    </div>
    <div class="manage-subhead" style="margin-top:20px;">${LANG.tasksLabel}</div>`;

  DATA.groupOrder.forEach(g=>{

function taskRowHTML(t,idx,groupLen,weights){
  if(editingTaskId===t.id) return editFormHTML(t);
  if(confirmDelTaskId===t.id) return `
    <div class="manage-row">
      <span class="row-label">${LANG.delTask(esc(t.label))}</span>
      <div class="row-actions">
        <button data-action="cancel-del-task" data-id="${t.id}">${LANG.cancel}</button>
        <button class="danger" data-action="confirm-del-task" data-id="${t.id}">${LANG.confirm}</button>
      </div>
    </div>`;
  const isHors = t.count===false;
  const w = isHors ? null : Math.round(weights&&weights[t.id]!=null?weights[t.id]:0);
  const weightCell = isHors
    ? `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:52px;text-align:center;">—</span>`
    : `<span class="weight-wrap"><input class="weight-input" type="number" data-action="set-weight" data-id="${t.id}" value="${w}" min="0" max="100" step="1"><span class="weight-pct">%</span></span>`;
  return `
    <div class="manage-row">
      <div class="move-btns">
        <button data-action="move-up" data-id="${t.id}" ${idx===0?'disabled':''}>▲</button>
        <button data-action="move-down" data-id="${t.id}" ${idx===groupLen-1?'disabled':''}>▼</button>
      </div>
      ${weightCell}
      <span class="row-label">${esc(t.label)} ${isHors?`<span class="row-tag">${LANG.hors}</span>`:''} ${t.notifTime?`<span class="row-tag notif-tag">🔔 ${t.notifTime}</span>`:''}</span>
      <div class="row-actions">
        <button data-action="edit-task" data-id="${t.id}" title="Modifier">✎</button>
        <button class="danger" data-action="del-task" data-id="${t.id}">🗑</button>
      </div>
    </div>`;
}

function editFormHTML(t){
  const groupOptions=DATA.groupOrder.map(g=>`<option value="${g}" ${g===t.group?'selected':''}>${esc(DATA.groups[g]?DATA.groups[g].label:g)}</option>`).join('');

    <div class="manage-row"><div class="edit-form">

/* ---- MANAGE EVENTS ---- */
function onManageChange(e){
  const inp=e.target.closest('input[data-action="set-weight"]'); if(!inp) return;
  const id=inp.getAttribute('data-id');
  const val=Math.max(0,Math.min(100,parseInt(inp.value)||0)); inp.value=val;
  setTaskWeight(id,val);
  const weights=getWeights();
  document.querySelectorAll('input[data-action="set-weight"]').forEach(other=>{
    if(other.getAttribute('data-id')!==id) other.value=Math.round(weights[other.getAttribute('data-id')]||0);
  });
  const total=Math.round(Object.values(weights).reduce((s,v)=>s+v,0));
  const totalColor=total===100?'var(--sage)':(total>100?'var(--danger)':'var(--gold)');
  document.querySelectorAll('.weight-total-val').forEach(el=>{ el.textContent=total+'%'; el.style.color=totalColor; });
  document.querySelectorAll('.weight-total-bar').forEach(bar=>{ bar.style.width=Math.min(total,100)+'%'; bar.style.background=totalColor; });
}

function onManageClick(e){
  const btn=e.target.closest('button[data-action]'); if(!btn) return;
  const action=btn.getAttribute('data-action'); const id=btn.getAttribute('data-id');
  if(action==='move-up') moveTask(id,-1);
  else if(action==='move-down') moveTask(id,1);
  else if(action==='edit-task'){ editingTaskId=id; confirmDelTaskId=null; render(); }
  else if(action==='cancel-edit-task'){ editingTaskId=null; render(); }
  else if(action==='save-edit-task') saveEditTask(id);
  else if(action==='del-task'){ confirmDelTaskId=id; editingTaskId=null; render(); }
  else if(action==='cancel-del-task'){ confirmDelTaskId=null; render(); }
  else if(action==='confirm-del-task') deleteTask(id);
  else if(action==='add-task') addNewTask();
  else if(action==='edit-group'){ editingGroupId=id; confirmDelGroupId=null; render(); }
  else if(action==='cancel-edit-group'){ editingGroupId=null; render(); }
  else if(action==='save-edit-group') saveEditGroup(id);
  else if(action==='del-group'){ confirmDelGroupId=id; editingGroupId=null; render(); }
  else if(action==='cancel-del-group'){ confirmDelGroupId=null; render(); }
  else if(action==='confirm-del-group'){
    const ids=DATA.tasks.filter(t=>t.group===id).map(t=>t.id);
    DATA.tasks=DATA.tasks.filter(t=>t.group!==id);
    DATA.groupOrder=DATA.groupOrder.filter(x=>x!==id);
    delete DATA.groups[id];
    Object.values(DATA.days).forEach(day=>{ ids.forEach(tid=>{ if(day.tasks) delete day.tasks[tid]; }); });
    confirmDelGroupId=null; saveData(DATA); render(); showStatus(LANG.statusGroupDel);
  }
  else if(action==='add-group') addNewGroup();
  else if(action==='section-font-up'||action==='section-font-down'){
    const cur=DATA.sectionFontSize||12;
    const next=action==='section-font-up'?Math.min(cur+2,28):Math.max(cur-2,10);
    DATA.sectionFontSize=next; applySectionFontSize(next); saveData(DATA);
    const lbl=document.getElementById('fontSizeLabel'); if(lbl) lbl.textContent=next+'px';
  }
}

function saveEditGroup(id){
  const g=DATA.groups[id]; if(!g) return;
  const li=document.getElementById('editGroupLabelInput'); const ci=document.getElementById('editGroupColorInput');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptyLabel, true); return; }
  g.label=label; if(ci) g.color=ci.value;
  editingGroupId=null; saveData(DATA); render(); showStatus(LANG.statusGroupEdited);
}

function addNewGroup(){
  const li=document.getElementById('newGroupLabel'); const ci=document.getElementById('newGroupColor');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptySection, true); return; }
  const id='grp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  DATA.groups[id]={label, color:ci?ci.value:'#9C8FC4'};
  DATA.groupOrder.push(id); saveData(DATA); render(); showStatus(LANG.statusGroupAdded);
}

function moveTask(id,dir){
  const task=DATA.tasks.find(t=>t.id===id); if(!task) return;
  const gi=DATA.tasks.filter(t=>t.group===task.group); const pos=gi.findIndex(t=>t.id===id);
  const sw=gi[pos+dir]; if(!sw) return;
  const i1=DATA.tasks.indexOf(task); const i2=DATA.tasks.indexOf(sw);
  [DATA.tasks[i1],DATA.tasks[i2]]=[DATA.tasks[i2],DATA.tasks[i1]];
  saveData(DATA); render();
}

function saveEditTask(id){
  const task=DATA.tasks.find(t=>t.id===id); if(!task) return;
  const li=document.getElementById('editLabelInput'); const gs=document.getElementById('editGroupSelect'); const cc=document.getElementById('editCountChk');
  const nt=document.getElementById('editNotifTime');
  const label=li?li.value.trim():''; if(!label){ showStatus('Le nom est vide.', true); return; }
  task.label=label; task.group=gs.value; if(cc.checked) delete task.count; else task.count=false;
  if(nt && nt.value) task.notifTime=nt.value; else delete task.notifTime;
  editingTaskId=null; saveData(DATA);
  // Reprogrammer les notifications avec les nouvelles heures
  if(notifEnabled() && Notification.permission==='granted') scheduleAllNotifications();
  render(); showStatus(LANG.statusTaskEdited);
}

function deleteTask(id){
  DATA.tasks.splice(DATA.tasks.findIndex(t=>t.id===id),1);
  Object.values(DATA.days).forEach(day=>{ if(day.tasks) delete day.tasks[id]; });
  if(DATA.weights) delete DATA.weights[id];
  confirmDelTaskId=null; saveData(DATA); render(); showStatus(LANG.statusTaskDel);
}

function addNewTask(){
  const li=document.getElementById('newTaskLabel'); const gs=document.getElementById('newTaskGroup'); const cc=document.getElementById('newTaskCount');
  const label=li?li.value.trim():''; if(!label){ showStatus(LANG.statusEmptyTask, true); return; }
  const id='task_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const t={id,group:gs.value,label}; if(!cc.checked) t.count=false;
  DATA.tasks.push(t); saveData(DATA); render(); showStatus(LANG.statusTaskAdded);
}

/* ---- RESET ---- */
function resetButtonsHTML(){ return `<div class="reset-row"><button class="btn btn-ghost btn-reset" data-scope="day">${LANG.resetDay}</button><button class="btn btn-ghost btn-reset" data-scope="month">${LANG.resetMonth}</button><button class="btn btn-ghost btn-reset" data-scope="all">${LANG.resetAll}</button></div>`; }
function renderResetZone(){ const z=document.getElementById('resetZone'); z.innerHTML=resetButtonsHTML(); z.querySelectorAll('.btn-reset').forEach(b=>b.addEventListener('click',()=>showResetConfirm(b.getAttribute('data-scope')))); }
function showResetConfirm(scope){
  const labels=LANG.resetScopes(LANG.months[viewMonth],viewYear);
  const z=document.getElementById('resetZone');
  z.innerHTML=`<div class="confirm-bar"><span>${LANG.resetConfirm(labels[scope])}</span><div class="confirm-actions"><button class="btn-ghost" id="confirmCancel">${LANG.cancel}</button><button class="btn-danger" id="confirmYes">${LANG.confirm}</button></div></div>`;
  document.getElementById('confirmCancel').addEventListener('click',renderResetZone);
  document.getElementById('confirmYes').addEventListener('click',()=>doReset(scope));
}
function doReset(scope){
  if(scope==='day'){ DATA.days[todayKey]={tasks:emptyTaskState(),finished:false,percent:0,comment:''}; }
  else if(scope==='month'){ Object.keys(DATA.days).forEach(k=>{ const d=parseKey(k); if(d.getFullYear()===viewYear&&d.getMonth()===viewMonth) delete DATA.days[k]; }); ensureToday(); }
  else if(scope==='all'){ DATA={days:{},tasks:DATA.tasks,groups:DATA.groups,groupOrder:DATA.groupOrder,weights:DATA.weights,sectionFontSize:DATA.sectionFontSize}; ensureToday(); }
  saveData(DATA); closeEditor(); render(); showStatus(LANG.statusReset);
}

/* ---- EXPORT / IMPORT ---- */
function onExport(){
  try{
    const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`mizan-suivi-${todayKey}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showStatus(LANG.statusExport);
  }catch(e){ showStatus(LANG.statusExportErr, true); }
}
function onImport(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const inc=JSON.parse(ev.target.result); if(!inc||!inc.days) throw new Error('format');
      DATA.days=Object.assign({},DATA.days,inc.days);
      if(inc.tasks&&Array.isArray(inc.tasks)&&inc.tasks.length) DATA.tasks=inc.tasks;
      if(inc.groups&&typeof inc.groups==='object') DATA.groups=inc.groups;
      if(inc.groupOrder&&Array.isArray(inc.groupOrder)) DATA.groupOrder=inc.groupOrder;
      if(inc.weights) DATA.weights=inc.weights;
      ensureGroups(); ensureTasks(); ensureToday(); saveData(DATA); render(); showStatus(LANG.statusImport);
    }catch(err){ showStatus(LANG.statusImportErr, true); }
  };
  reader.readAsText(file); e.target.value='';
}

function showStatus(msg,isError){
  const el=document.getElementById('statusMsg'); if(!el) return;
  el.textContent=msg; el.classList.toggle('error',!!isError);
  clearTimeout(statusTimer); statusTimer=setTimeout(()=>{ el.textContent=''; },4500);
}

/* ---- NOTIFICATIONS ---- */
const NOTIF_KEY = 'trading-notif-enabled';
let _notifTimers = [];

function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function notifEnabled(){
  return localStorage.getItem(NOTIF_KEY) === '1';
}

function buildScheduleFromTasks(){
  // Construit la liste de notifications depuis les tâches qui ont un notifTime
  return DATA.tasks
    .filter(t => t.notifTime)
    .map(t => {
      const [h, m] = t.notifTime.split(':').map(Number);
      const group = DATA.groups[t.group];
      const emoji = group ? '🔔' : '🔔';
      return {
        h, m,
        id: t.id,
        title: `${emoji} ${t.label}`,
        body: LANG.notifBody(t.label)
      };
    });
}

function clearAllNotifTimers(){
  _notifTimers.forEach(id => clearTimeout(id));
  _notifTimers = [];
}

function scheduleAllNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  if(!notifEnabled()) return;
  if(!('serviceWorker' in navigator)) return;

  clearAllNotifTimers();
  const schedule = buildScheduleFromTasks();
  if(schedule.length === 0) return;

  navigator.serviceWorker.ready.then(reg => {
    const now = new Date();
    schedule.forEach(item => {
      const target = new Date();
      target.setHours(item.h, item.m, 0, 0);
      if(target <= now) target.setDate(target.getDate() + 1);
      const delay = target.getTime() - now.getTime();
      const tid = setTimeout(() => {
        if(Notification.permission === 'granted' && notifEnabled()){
          const entry = DATA && DATA.days[todayKey];
          if(entry && entry.tasks && entry.tasks[item.id] === true) return;
          reg.showNotification(item.title, {
            body: LANG.notifBody(item.title.replace(/^[^ ]+ /,'')),
            icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'32\' fill=\'%2314161F\'/%3E%3Ccircle cx=\'96\' cy=\'96\' r=\'60\' fill=\'none\' stroke=\'%23D4A24C\' stroke-width=\'8\'/%3E%3Ctext x=\'96\' y=\'108\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
            badge: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 96 96\'%3E%3Crect width=\'96\' height=\'96\' rx=\'16\' fill=\'%2314161F\'/%3E%3Ctext x=\'48\' y=\'64\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
            tag: 'trading-' + item.id,
            renotify: true,
            vibrate: [200, 100, 200],
            data: { taskId: item.id }
          });
          // Re-programmer pour le lendemain après déclenchement
          setTimeout(() => scheduleAllNotifications(), 5000);
        }
      }, delay);
      _notifTimers.push(tid);
    });
  }).catch(() => {});
}

async function requestNotifPermission(){
  if(!('Notification' in window)){
    showStatus('Notifications non supportées sur ce navigateur.', true);
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    localStorage.setItem(NOTIF_KEY, '1');
    scheduleAllNotifications();
    showStatus('Notifications activées ✅');
    renderNotifBar();
    new Notification('✅ Trading — Notifications activées', {
      body: LANG.notifTestBody,
      icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'32\' fill=\'%2314161F\'/%3E%3Ccircle cx=\'96\' cy=\'96\' r=\'60\' fill=\'none\' stroke=\'%23D4A24C\' stroke-width=\'8\'/%3E%3Ctext x=\'96\' y=\'108\' text-anchor=\'middle\' font-size=\'52\' font-family=\'serif\' fill=\'%23D4A24C\'%3EM%3C%2Ftext%3E%3C%2Fsvg%3E',
    });
  } else {
    showStatus('Permission refusée. Active les notifications dans les réglages.', true);
    renderNotifBar();
  }
}

function disableNotifications(){
  localStorage.setItem(NOTIF_KEY, '0');
  clearAllNotifTimers();
  showStatus('Notifications désactivées.');
  renderNotifBar();
}

function notifBarHTML(){
  const hasNotifAPI = 'Notification' in window;
  const perm = hasNotifAPI ? Notification.permission : 'denied';
  const enabled = notifEnabled();
  const standalone = isStandalone();
  const ios = isIOS();
  const scheduled = buildScheduleFromTasks();

  if(ios && !standalone){
    return `
      <div class="notif-install" id="notifInstallGuide">
        <b>${LANG.notifInstallTitle}</b>
        ${LANG.notifInstallSteps.map(s=>`<li>${s}</li>`).join('')}
      </div>`;
  }

  if(!hasNotifAPI || perm === 'denied'){
    return `
      <div class="notif-bar">
        <div class="notif-txt"><b>${LANG.notifTitleOff}</b>${LANG.notifUnavailable}</div>
        <button class="btn-notif denied" disabled>${LANG.notifDenied}</button>
      </div>`;
  }

  if(perm === 'granted' && enabled){
    const count = scheduled.length;
    const countTxt = LANG.notifEnabled(count);
    return `
      <div class="notif-bar">
        <div class="notif-txt"><b>${LANG.notifTitle}</b>${countTxt}</div>
        <button class="btn-notif on" id="btnNotif">${LANG.notifActive}</button>
      </div>`;
  }

  return `
    <div class="notif-bar">
      <div class="notif-txt"><b>${LANG.notifTitleOff}</b>${LANG.notifDesc}</div>
      <button class="btn-notif" id="btnNotif">${LANG.notifActivate}</button>
    </div>`;
}

function renderNotifBar(){
  const zone = document.getElementById('notifBarZone');
  if(!zone) return;
  zone.innerHTML = notifBarHTML();
  const btn = document.getElementById('btnNotif');
  if(btn){
    if(notifEnabled() && Notification.permission === 'granted'){
      btn.addEventListener('click', disableNotifications);
    } else {
      btn.addEventListener('click', requestNotifPermission);
    }
  }
}

(function(){
  const TODO_KEY = 'mizan-todo-data';
  const TODO_NOTIF_KEY = 'mizan-todo-notif-enabled';
  let todoTimers = [];

  function loadTodos(){
    try{ const r = localStorage.getItem(TODO_KEY); return r ? JSON.parse(r) : []; }
    catch(e){ return []; }
  }
  function saveTodos(list){
    try{ localStorage.setItem(TODO_KEY, JSON.stringify(list)); }catch(e){}
  }
  function todoNotifEnabled(){ return localStorage.getItem(TODO_NOTIF_KEY) === '1'; }
  function escTodo(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function uid(){ return 't' + Date.now() + Math.random().toString(36).slice(2,7); }

  function addTodo(title, time){
    const list = loadTodos();
    list.push({ id: uid(), title, time: time || '', done: false, createdAt: Date.now() });
    saveTodos(list);
    renderTodoList();
    scheduleTodoNotifications();
  }

  function toggleTodo(id){
    const list = loadTodos();
    const item = list.find(t => t.id === id);
    if(item) item.done = !item.done;
    saveTodos(list);
    renderTodoList();
    scheduleTodoNotifications();
  }

  function deleteTodo(id){
    let list = loadTodos();
    list = list.filter(t => t.id !== id);
    saveTodos(list);
    renderTodoList();
    scheduleTodoNotifications();
  }

  function clearCompleted(){
    if(!confirm(TVLANG.confirmClearDone)) return;
    let list = loadTodos();
    list = list.filter(t => !t.done);
    saveTodos(list);
    renderTodoList();
  }

  function clearAllTodos(){
    if(!confirm(TVLANG.confirmClearAll)) return;
    saveTodos([]);
    renderTodoList();
    clearTodoTimers();
  }

  function todoItemHTML(t){
    return `
      <div class="todo-item ${t.done?'done':''}" data-id="${t.id}">
        <button class="todo-check" data-action="toggle" data-id="${t.id}">${t.done?'✓':''}</button>
        <div class="todo-body">
          <div class="todo-title">${escTodo(t.title)}</div>
          ${t.time?`<div class="todo-time">🔔 ${escTodo(t.time)}</div>`:''}
        </div>
        <button class="todo-del" data-action="delete" data-id="${t.id}" title="${TVLANG.delTitle}">🗑️</button>
      </div>`;
  }

  function renderTodoList(){
    const zone = document.getElementById('todoListZone');
    if(!zone) return;
    const list = loadTodos();
    const pending = list.filter(t => !t.done).sort((a,b)=>a.createdAt-b.createdAt);
    const done = list.filter(t => t.done).sort((a,b)=>b.createdAt-a.createdAt);

    zone.innerHTML = `
      <div class="todo-section-label">${TVLANG.todoPending} ${pending.length?`(${pending.length})`:''}</div>
      <div class="todo-list">
        ${pending.length ? pending.map(todoItemHTML).join('') : `<div class="todo-empty">${TVLANG.todoEmptyPending}</div>`}
      </div>
      <div class="todo-section-label">
        <span>${TVLANG.todoDone} ${done.length?`(${done.length})`:''}</span>
      </div>
      <div class="todo-list">
        ${done.length ? done.map(todoItemHTML).join('') : `<div class="todo-empty">${TVLANG.todoEmptyDone}</div>`}
      </div>
      <div class="todo-clear-row" style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-todo-clear" id="todoClearDone">${TVLANG.clearDone}</button>
        <button class="btn-todo-clear" id="todoClearAll">${TVLANG.clearAll}</button>
      </div>`;

    zone.querySelectorAll('[data-action="toggle"]').forEach(b => b.addEventListener('click', () => toggleTodo(b.getAttribute('data-id'))));
    zone.querySelectorAll('[data-action="delete"]').forEach(b => b.addEventListener('click', () => deleteTodo(b.getAttribute('data-id'))));
    const cd = document.getElementById('todoClearDone'); if(cd) cd.addEventListener('click', clearCompleted);
    const ca = document.getElementById('todoClearAll'); if(ca) ca.addEventListener('click', clearAllTodos);
  }

  function todoNotifBarHTML(){
    const hasAPI = 'Notification' in window;
    const perm = hasAPI ? Notification.permission : 'denied';
    if(!hasAPI || perm === 'denied'){
      return `<div class="notif-bar"><div class="notif-txt"><b>${TVLANG.notifLabel}</b>${TVLANG.notifUnavailable}</div></div>`;
    }
    if(perm === 'granted' && todoNotifEnabled()){
      return `<div class="notif-bar"><div class="notif-txt"><b>${TVLANG.notifLabelOn}</b>${TVLANG.notifDescOn}</div><button class="btn-notif on" id="todoNotifBtn">${TVLANG.notifOnBtn}</button></div>`;
    }
    return `<div class="notif-bar"><div class="notif-txt"><b>${TVLANG.notifLabel}</b>${TVLANG.notifDescOff}</div><button class="btn-notif" id="todoNotifBtn">${TVLANG.notifActivateBtn}</button></div>`;
  }

  function renderTodoNotifBar(){
    const zone = document.getElementById('todoNotifZone');
    if(!zone) return;
    zone.innerHTML = todoNotifBarHTML();
    const btn = document.getElementById('todoNotifBtn');
    if(btn){
      btn.addEventListener('click', async () => {
        if(todoNotifEnabled() && Notification.permission === 'granted'){
          localStorage.setItem(TODO_NOTIF_KEY, '0');
          clearTodoTimers();
          renderTodoNotifBar();
          return;
        }
        const perm = await Notification.requestPermission();
        if(perm === 'granted'){
          localStorage.setItem(TODO_NOTIF_KEY, '1');
          scheduleTodoNotifications();
        }
        renderTodoNotifBar();
      });
    }
  }

  function clearTodoTimers(){
    todoTimers.forEach(id => clearTimeout(id));
    todoTimers = [];
  }

  function scheduleTodoNotifications(){
    if(!('Notification' in window) || Notification.permission !== 'granted') return;
    if(!todoNotifEnabled()) return;
    if(!('serviceWorker' in navigator)) return;
    clearTodoTimers();
    const list = loadTodos().filter(t => t.time && !t.done);
    if(!list.length) return;
    navigator.serviceWorker.ready.then(reg => {
      const now = new Date();
      list.forEach(t => {
        const [h,m] = t.time.split(':').map(Number);
        const target = new Date();
        target.setHours(h, m, 0, 0);
        if(target <= now) target.setDate(target.getDate() + 1);
        const delay = target.getTime() - now.getTime();
        const tid = setTimeout(() => {
          const cur = loadTodos().find(x => x.id === t.id);
          if(cur && !cur.done && todoNotifEnabled() && Notification.permission === 'granted'){
            reg.showNotification('✅ ' + t.title, {
              body: TVLANG.notifBody,
              tag: 'todo-' + t.id,
              renotify: true,
              vibrate: [200,100,200],
              data: { todoId: t.id }
            });
            setTimeout(() => scheduleTodoNotifications(), 5000);
          }
        }, delay);
        todoTimers.push(tid);
      });
    }).catch(()=>{});
  }

  function switchPage(page){
    document.getElementById('page-mizan').classList.toggle('active', page === 'mizan');
    document.getElementById('page-todo').classList.toggle('active', page === 'todo');
    document.getElementById('page-vision').classList.toggle('active', page === 'vision');
    document.getElementById('page-trading').classList.toggle('active', page === 'trading');
    document.getElementById('tabBtnMizan').classList.toggle('active', page === 'mizan');
    document.getElementById('tabBtnTodo').classList.toggle('active', page === 'todo');
    document.getElementById('tabBtnVision').classList.toggle('active', page === 'vision');
    document.getElementById('tabBtnTrading').classList.toggle('active', page === 'trading');
    try{ localStorage.setItem('mizan-active-page', page); }catch(e){}
  }

  function applyTodoStaticText(){
    const eyebrow = document.getElementById('todoEyebrow'); if(eyebrow) eyebrow.textContent = TVLANG.todoEyebrow;
    const heading = document.getElementById('todoTitleHeading'); if(heading) heading.textContent = TVLANG.todoTitle;
    const titleInput = document.getElementById('todoTitleInput'); if(titleInput) titleInput.placeholder = TVLANG.todoPlaceholder;
    const addBtn = document.getElementById('todoAddBtn'); if(addBtn) addBtn.textContent = TVLANG.addBtn;
  }

  function initTodoTab(){
    // Navigation gérée globalement par le script en haut de page

    const savedPage = (function(){ try{ return localStorage.getItem('mizan-active-page'); }catch(e){ return null; } })();
    if(savedPage === 'todo') switchPage('todo');
    else if(savedPage === 'vision') switchPage('vision');
    else if(savedPage === 'trading') switchPage('trading');

    const langZone = document.getElementById('todoLangZone');
    if(langZone){ langZone.innerHTML = tvLangSelectorHTML('todoLang'); initTVLangSelector('todoLang'); }
    document.getElementById('page-todo').setAttribute('dir', TVLANG.dir);
    applyTodoStaticText();

    document.getElementById('todoAddBtn').addEventListener('click', () => {
      const titleEl = document.getElementById('todoTitleInput');
      const timeEl = document.getElementById('todoTimeInput');
      const title = titleEl.value.trim();
      if(!title) return;
      addTodo(title, timeEl.value);
      titleEl.value = '';
      timeEl.value = '';
      titleEl.focus();
    });
    document.getElementById('todoTitleInput').addEventListener('keydown', e => {
      if(e.key === 'Enter') document.getElementById('todoAddBtn').click();
    });

    renderTodoList();
    renderTodoNotifBar();
    if(todoNotifEnabled() && 'Notification' in window && Notification.permission === 'granted'){
      scheduleTodoNotifications();
    }

    onTVLangChange(() => {
      const lz = document.getElementById('todoLangZone');
      if(lz){ lz.innerHTML = tvLangSelectorHTML('todoLang'); initTVLangSelector('todoLang'); }
      applyTodoStaticText();
      renderTodoList();
      renderTodoNotifBar();
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initTodoTab);
  } else {
    initTodoTab();
  }
})();

(function(){
  const VISION_KEY = 'mizan-vision-data';
  const VISION_COLORS = ['#D4A24C','#7FA66B','#9C8FC4','#C97B63','#7E8BD1'];
  let editingSectionId = null;

  function loadVision(){
    try{
      const r = localStorage.getItem(VISION_KEY);
      const d = r ? JSON.parse(r) : null;
      if(d && Array.isArray(d.sections)) return d;
      return { sections: [] };
    }catch(e){ return { sections: [] }; }
  }
  function saveVision(data){
    try{ localStorage.setItem(VISION_KEY, JSON.stringify(data)); }catch(e){}
  }
  function escVision(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function vuid(){ return 'v' + Date.now() + Math.random().toString(36).slice(2,7); }
  function suggestedColor(){
    const data = loadVision();
    return VISION_COLORS[data.sections.length % VISION_COLORS.length];
  }
  function shortDate(ts){
    const d = new Date(ts);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    return `${dd}/${mm}/${String(d.getFullYear()).slice(2)}`;
  }

  function addSection(name, color){
    const data = loadVision();
    const assigned = color || VISION_COLORS[data.sections.length % VISION_COLORS.length];
    data.sections.push({ id: vuid(), name: name.trim(), color: assigned, collapsed:false, ideas: [] });
    saveVision(data);
    renderVision();
  }
  function renameSection(id, name, color){
    const data = loadVision();
    const sec = data.sections.find(s=>s.id===id);
    if(sec){
      if(name && name.trim()) sec.name = name.trim();
      if(color) sec.color = color;
    }
    saveVision(data);
    editingSectionId = null;
    renderVision();
  }
  function deleteSection(id){
    const data = loadVision();
    const sec = data.sections.find(s=>s.id===id);
    const n = sec ? sec.ideas.length : 0;
    if(!confirm(n>0 ? TVLANG.confirmDelSectionN(n) : TVLANG.confirmDelSectionEmpty)) return;
    data.sections = data.sections.filter(s=>s.id!==id);
    saveVision(data);
    renderVision();
  }
  function toggleCollapse(id){
    const data = loadVision();
    const sec = data.sections.find(s=>s.id===id);
    if(sec) sec.collapsed = !sec.collapsed;
    saveVision(data);
    renderVision();
  }
  function addIdea(sectionId, text){
    if(!text || !text.trim()) return;
    const data = loadVision();
    const sec = data.sections.find(s=>s.id===sectionId);
    if(!sec) return;
    sec.ideas.unshift({ id: vuid(), text: text.trim(), createdAt: Date.now() });
    saveVision(data);
    renderVision();
  }
  function deleteIdea(sectionId, ideaId){
    const data = loadVision();
    const sec = data.sections.find(s=>s.id===sectionId);
    if(!sec) return;
    sec.ideas = sec.ideas.filter(i=>i.id!==ideaId);
    saveVision(data);
    renderVision();
  }

          <button data-action="delete-section" data-id="${sec.id}" class="danger" title="${TVLANG.deleteTitle}">🗑️</button>

      </div>`;
    const body = `
      <div class="vision-section-body">
        <div class="vision-add-idea">
          <textarea id="visionIdeaInput-${sec.id}" placeholder="${TVLANG.ideaPlaceholder}" rows="1"></textarea>
          <button data-action="add-idea" data-id="${sec.id}">➕</button>
        </div>
        <div class="vision-idea-list">
          ${sec.ideas.length ? sec.ideas.map(i=>ideaHTML(sec.id,i)).join('') : `<div class="vision-empty">${TVLANG.emptyIdeas}</div>`}
        </div>
      </div>`;
    return `<div class="vision-section ${sec.collapsed?'collapsed':''}" style="border-left-color:${sec.color}" data-section-id="${sec.id}">
      ${head}
      ${isEditing ? '' : body}
    </div>`;
  }

  function renderVision(){
    const zone = document.getElementById('visionSectionsZone');
    if(!zone) return;
    const data = loadVision();
    if(!data.sections.length){
      zone.innerHTML = `<div class="vision-empty-state">${TVLANG.emptySections}</div>`;
      return;
    }
    zone.innerHTML = `<div class="vision-sections">${data.sections.map(sectionCardHTML).join('')}</div>`;

    zone.querySelectorAll('[data-action="toggle-collapse"]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.closest('.vision-section-actions')) return;
        toggleCollapse(el.getAttribute('data-id'));
      });
    });
    zone.querySelectorAll('[data-action="edit-section"]').forEach(b=>b.addEventListener('click', (e)=>{
      e.stopPropagation();
      editingSectionId = b.getAttribute('data-id');
      renderVision();
    }));
    zone.querySelectorAll('[data-action="delete-section"]').forEach(b=>b.addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteSection(b.getAttribute('data-id'));
    }));
    zone.querySelectorAll('[data-action="save-rename"]').forEach(b=>b.addEventListener('click', ()=>{
      const id = b.getAttribute('data-id');
      const nameEl = document.getElementById('visionRenameInput-'+id);
      const colorEl = document.getElementById('visionRenameColor-'+id);
      renameSection(id, nameEl ? nameEl.value : '', colorEl ? colorEl.value : null);
    }));
    zone.querySelectorAll('[data-action="cancel-rename"]').forEach(b=>b.addEventListener('click', ()=>{
      editingSectionId = null;
      renderVision();
    }));
    zone.querySelectorAll('[data-action="add-idea"]').forEach(b=>b.addEventListener('click', ()=>{
      const id = b.getAttribute('data-id');
      const ta = document.getElementById('visionIdeaInput-'+id);
      if(ta) addIdea(id, ta.value);
    }));
    zone.querySelectorAll('[data-action="delete-idea"]').forEach(b=>b.addEventListener('click', ()=>{
      deleteIdea(b.getAttribute('data-section'), b.getAttribute('data-id'));
    }));
    zone.querySelectorAll('textarea[id^="visionIdeaInput-"]').forEach(ta=>{
      ta.addEventListener('keydown', e=>{
        if(e.key === 'Enter' && !e.shiftKey){
          e.preventDefault();
          const id = ta.id.replace('visionIdeaInput-','');
          addIdea(id, ta.value);
        }
      });
    });
  }

  function applyVisionStaticText(){
    const eyebrow = document.getElementById('visionEyebrow'); if(eyebrow) eyebrow.textContent = TVLANG.visionEyebrow;
    const heading = document.getElementById('visionTitleHeading'); if(heading) heading.textContent = TVLANG.visionTitle;
    const nameInput = document.getElementById('visionSectionInput'); if(nameInput) nameInput.placeholder = TVLANG.sectionPlaceholder;
    const addBtn = document.getElementById('visionAddSectionBtn'); if(addBtn) addBtn.textContent = TVLANG.addSectionBtn;
    const colorEl = document.getElementById('visionSectionColor'); if(colorEl) colorEl.title = TVLANG.colorTitle;
  }

  function initVisionTab(){
    const colorEl = document.getElementById('visionSectionColor');
    if(colorEl) colorEl.value = suggestedColor();

    const langZone = document.getElementById('visionLangZone');
    if(langZone){ langZone.innerHTML = tvLangSelectorHTML('visionLang'); initTVLangSelector('visionLang'); }
    document.getElementById('page-vision').setAttribute('dir', TVLANG.dir);
    applyVisionStaticText();

    const addBtn = document.getElementById('visionAddSectionBtn');
    if(addBtn){
      addBtn.addEventListener('click', ()=>{
        const nameEl = document.getElementById('visionSectionInput');
        const name = nameEl.value.trim();
        if(!name) return;
        addSection(name, colorEl ? colorEl.value : null);
        nameEl.value = '';
        nameEl.focus();
        if(colorEl) colorEl.value = suggestedColor();
      });
    }
    const nameInput = document.getElementById('visionSectionInput');
    if(nameInput){
      nameInput.addEventListener('keydown', e=>{
        if(e.key === 'Enter'){ e.preventDefault(); addBtn.click(); }
      });
    }
    renderVision();

    onTVLangChange(() => {
      const lz = document.getElementById('visionLangZone');
      if(lz){ lz.innerHTML = tvLangSelectorHTML('visionLang'); initTVLangSelector('visionLang'); }
      applyVisionStaticText();
      renderVision();
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initVisionTab);
  } else {
    initVisionTab();
  }
})();
/* =================== FIN VISION TAB =================== */
</script>
</body>
</html>
